name: Ka0s Agent Ingest (Unified)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to ingest (docs, skills, infra, code, audit, compliance, devops, github, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - docs
          - skills
          - infra
          - code
          - audit
          - compliance
          - devops
          - github
          - all
  schedule:
    - cron: '0 2 * * *' # Nightly Full Ingest (2:00 AM UTC)
  push:
    paths:
      - '.trae/skills/**'
      - '.trae/rules/**'
      - 'core/docs/**'
      - 'core/b2b/**'
      - '.github/workflows/**'

jobs:
  ingest:
    runs-on: swarm-runners-scaleset
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install psycopg2-binary langchain-community langchain-huggingface nomic sentence-transformers

      # Lógica de detección de cambios para ejecución automática por push
      - name: Determine Module (Auto-Trigger)
        id: determine-module
        if: github.event_name == 'push'
        run: |
          # Si se disparó por push, determinamos qué módulo ejecutar basándonos en los paths cambiados
          # Nota: GitHub Actions 'paths' filter ya filtró el evento, pero aquí refinamos el argumento
          # Para simplificar, si es push, detectamos el cambio principal o hacemos un partial ingest seguro.
          
          # Prioridad: Skills > Docs > Infra
          if git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "^.trae/"; then
            echo "module=skills" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "^core/docs/"; then
            echo "module=docs" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "^core/b2b/"; then
            echo "module=infra" >> $GITHUB_OUTPUT
          else
            # Fallback seguro para otros cambios en paths vigilados
            echo "module=infra" >> $GITHUB_OUTPUT
          fi

      - name: Set Module Variable
        id: set-var
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "TARGET_MODULE=all" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET_MODULE=${{ inputs.module }}" >> $GITHUB_ENV
          else
            echo "TARGET_MODULE=${{ steps.determine-module.outputs.module }}" >> $GITHUB_ENV
          fi

      - name: Run Ingestion
        env:
          DB_HOST: "postgres-ia.core-services.svc.cluster.local"
          DB_PORT: "5432"
          DB_NAME: "kaos_memory"
          DB_USER: "postgres"
          DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          echo "🚀 Starting Ingestion for Module: $TARGET_MODULE"
          
          if [ "$TARGET_MODULE" == "all" ]; then
            # Ejecución secuencial ordenada para el Nightly/Full
            modules=("skills" "docs" "infra" "devops" "github" "compliance" "audit" "code")
            for mod in "${modules[@]}"; do
              echo "::group::Ingesting $mod"
              python core/ai/memory/ingest_local.py --module $mod
              echo "::endgroup::"
            done
          else
            # Ejecución puntual
            python core/ai/memory/ingest_local.py --module $TARGET_MODULE
          fi

name: Ka0s Remediation - High CPU/Load
on:
  workflow_dispatch:
    inputs:
      node_name:
        description: 'Nombre del nodo afectado (ej: k8-manager)'
        required: true
        default: 'k8-manager'
      issue_number:
        description: 'ID de la Issue a actualizar (ej: 4365)'
        required: true

permissions:
  contents: write
  issues: write

env:
  KAOS_MODULE: "[Ka0S] Remediation High Load"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION (DIAGNOSE AND REPORT)
  # -----------------------------------------------------------------------------
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset-ka0s
    outputs:
      log_name: ${{ steps.filename.outputs.log_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Log Filename
        id: filename
        run: |
          # Formato: yyyymmdd_hhmmss_workflowid_IncidentID.log
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          RUN_ID="${{ github.run_id }}"
          INCIDENT="${{ inputs.issue_number }}"
          LOG_NAME="${TIMESTAMP}_${RUN_ID}_${INCIDENT}.log"
          echo "log_name=$LOG_NAME" >> $GITHUB_OUTPUT

      - name: Execute Diagnostic Script (SSH)
        uses: ./.github/actions/ssh-exec
        with:
          host: ${{ secrets.KAOS_SSH_HOST_1 }} 
          username: ${{ secrets.KAOS_SSH_USER }}
          key: ${{ secrets.KAOS_SSH_KEY_PRIV }}
          port: ${{ secrets.KAOS_SSH_PORT_1 }}
          pass: ${{ secrets.KAOS_SSH_PASS }}
          use-sudo: true
          script-path: 'devops/remediation/check-high-load.sh'
          script-args: '/tmp/ka0s-audit ${{ steps.filename.outputs.log_name }}'
          remote-results-path: '/tmp/ka0s-audit'
          local-results-path: 'audit/incidents/'

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOG_PATH="audit/incidents/${{ steps.filename.outputs.log_name }}"
          COMMENT_FILE="comment_body.md"
          
          # Construir el cuerpo del comentario en un archivo temporal
          echo "### 🩺 Diagnóstico Automático Ejecutado" > $COMMENT_FILE
          echo "**Workflow**: ${{ github.workflow }}" >> $COMMENT_FILE
          echo "**Nodo**: ${{ inputs.node_name }}" >> $COMMENT_FILE
          echo "**Log**: \`${{ steps.filename.outputs.log_name }}\`" >> $COMMENT_FILE
          echo "" >> $COMMENT_FILE
          echo "<details>" >> $COMMENT_FILE
          echo "<summary>Ver reporte (Top 50 líneas)</summary>" >> $COMMENT_FILE
          echo "" >> $COMMENT_FILE
          echo "\`\`\`bash" >> $COMMENT_FILE
          
          if [ -f "$LOG_PATH" ]; then
             head -n 50 "$LOG_PATH" >> $COMMENT_FILE
          else
             echo "Error: Log file not found at $LOG_PATH" >> $COMMENT_FILE
          fi
          
          echo "\`\`\`" >> $COMMENT_FILE
          echo "</details>" >> $COMMENT_FILE
          echo "" >> $COMMENT_FILE
          echo "> El log completo ha sido archivado en \`audit/incidents/\`." >> $COMMENT_FILE
          
          # Usar --body-file para evitar problemas de escaping
          gh issue comment ${{ inputs.issue_number }} --body-file $COMMENT_FILE

      - name: Commit Log Evidence
        if: success()
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          git pull origin ${{ github.ref }}
          git add audit/incidents/${{ steps.filename.outputs.log_name }}
          if ! git diff --staged --quiet; then
            git commit -m "[Ka0S] Evidence for Issue #${{ inputs.issue_number }}"
            git push origin ${{ github.ref }}
          else
             echo "No changes to commit."
          fi

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - name: Notify Success
        shell: bash
        run: echo "Diagnostico completado para Issue ${{ inputs.issue_number }}"

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INCIDENT_FILE="incident_body.md"
          
          # Construir cuerpo del incidente en archivo temporal
          echo "### Organización" > $INCIDENT_FILE
          echo "Ka0s" >> $INCIDENT_FILE
          echo "### Solicitante" >> $INCIDENT_FILE
          echo "@${{ github.actor }}" >> $INCIDENT_FILE
          echo "### Estado" >> $INCIDENT_FILE
          echo "New" >> $INCIDENT_FILE
          echo "### Impacto" >> $INCIDENT_FILE
          echo "Service" >> $INCIDENT_FILE
          echo "### Urgencia" >> $INCIDENT_FILE
          echo "Medium" >> $INCIDENT_FILE
          echo "### Servicio / CI afectado" >> $INCIDENT_FILE
          echo "GitHub Actions / ${{ github.workflow }}" >> $INCIDENT_FILE
          echo "### Descripción" >> $INCIDENT_FILE
          echo "El workflow **${{ github.workflow }}** ha fallado durante su ejecución." >> $INCIDENT_FILE
          echo "**Detalles Técnicos:**" >> $INCIDENT_FILE
          echo "- **Módulo**: ${{ env.KAOS_MODULE }}" >> $INCIDENT_FILE
          echo "- **Run ID**: ${{ github.run_id }}" >> $INCIDENT_FILE
          echo "### Pasos / Evidencias" >> $INCIDENT_FILE
          echo "Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $INCIDENT_FILE

          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body-file $INCIDENT_FILE

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

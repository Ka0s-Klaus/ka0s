name: "Ka0s Generate -> Daily Lead Time Report"

on:
  schedule:
    - cron: '55 23 * * *'  # 23:55 Daily
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Generación manual de reporte'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  KAOS_MODULE: "[Ka0s] Lead Time Report"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}
  PYTHON_VERSION: '3.10'
  MONGO_SUPERUSER_CONNECTION: ${{ secrets.DB_CONNECTION_STRING }}

jobs:
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset
    permissions:
      contents: write
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: pip install pymongo

      - name: Generate Timestamp
        id: meta
        run: |
          echo "TIMESTAMP=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_ENV
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Run Report Generation Script
        run: |
          python3 devops/core/mongo/scripts/generate-lead-time-report.py \
            --date "${{ env.DATE }}" \
            --output "audit/lead_time/${{ env.TIMESTAMP }}_${{ github.run_id }}_lead-time-report.md"

      - name: Commit & Push Results
        if: success()
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME || 'Ka0s Bot' }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL || 'bot@ka0s.io' }}"
          
          git add audit/lead_time/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(ka0s): update artifacts ${{ env.KAOS_MODULE }} run ${{ env.KAOS_CODE }} [skip ci]"
            
            # Reintento básico de push
            count=0
            until git push origin HEAD:${{ github.ref_name }} || [ $count -eq 5 ]; do
              echo "Push fallido, reintentando..."
              git pull --rebase origin ${{ github.ref_name }}
              ((count++))
              sleep 2
            done
          else
            echo "No hay cambios para subir."
          fi

  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    name: Finalizar Workflow
    needs: [core-execution, handle-success, handle-failure]
    runs-on: swarm-runners-scaleset
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli

      - name: Disparar Auditoría
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          gh workflow run inspector.yml \
            --ref main \
            -f kaos-workflow-id="${{ github.run_id }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

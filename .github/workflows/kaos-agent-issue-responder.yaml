name: "Ka0s Agent Issue Responder"

on:
  issues:
    types: [opened, edited, labeled, reopened]

permissions:
  contents: read
  issues: write # Necesario para comentar en la issue

env:
  KAOS_MODULE: "[Ka0S] Agent Responder"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}
  POSTGRES_HOST: postgresql-ia.postgresql-ia.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ka0s_memory"
  POSTGRES_USER: "ka0s_ai"
  OLLAMA_HOST: ollama.ollama.svc.cluster.local
  OLLAMA_PORT: "11434"
  EMBEDDING_MODEL: "nomic-embed-text"
  GENERATION_MODEL: "qwen2:1.5b" # Modelo ligero pero más inteligente para respuestas coherentes

jobs:
  agent-reply-degraded:
    if: contains(github.event.issue.labels.*.name, 'ka0s-agent') || contains(github.event.issue.labels.*.name, 'kaos-agent')
    name: Agent Reply (Degraded)
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}-degraded
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install psycopg2-binary requests

      - name: Ollama Preflight (Models)
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          host = os.environ.get('OLLAMA_HOST', 'localhost')
          port = os.environ.get('OLLAMA_PORT', '11434')
          base = f"http://{host}:{port}"

          required = [
            os.environ.get('GENERATION_MODEL', '').strip(),
            os.environ.get('EMBEDDING_MODEL', '').strip(),
          ]
          required = [m for m in required if m]

          def req(url, data=None):
            if data is None:
              r = urllib.request.Request(url, method='GET')
            else:
              r = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type':'application/json'}, method='POST')
            with urllib.request.urlopen(r, timeout=30) as resp:
              return resp.status, resp.read().decode('utf-8', errors='ignore')

          try:
            status, body = req(base + '/v1/models')
          except Exception as e:
            print(f"ERROR: no se pudo consultar {base}/v1/models: {e}")
            sys.exit(1)

          try:
            payload = json.loads(body)
          except Exception:
            payload = {}

          ids = set()
          for item in payload.get('data', []) if isinstance(payload, dict) else []:
            if isinstance(item, dict) and item.get('id'):
              ids.add(str(item['id']))

          missing = [m for m in required if m not in ids]
          if not missing:
            print('OK: modelos presentes')
            sys.exit(0)

          print('WARN: faltan modelos, intentando pull via /api/pull:', ', '.join(missing))
          for m in missing:
            try:
              s, b = req(base + '/api/pull', {'name': m, 'stream': False})
              print(f"pull {m}: http={s}")
            except Exception as e:
              print(f"ERROR: pull {m} falló: {e}")
              sys.exit(1)

          status2, body2 = req(base + '/v1/models')
          payload2 = json.loads(body2)
          ids2 = set(str(i.get('id')) for i in payload2.get('data', []) if isinstance(i, dict) and i.get('id'))
          still = [m for m in required if m not in ids2]
          if still:
            print('ERROR: modelos aún ausentes tras pull:', ', '.join(still))
            sys.exit(1)
          print('OK: modelos presentes tras pull')
          PY

      - name: Query Agent (Degraded)
        id: query
        env:
          QUESTION_TITLE: ${{ github.event.issue.title }}
          QUESTION_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Procesando Issue #$ISSUE_NUMBER (DEGRADED)"
          QUESTION="$(printf "%s\n\n%s" "$QUESTION_TITLE" "$QUESTION_BODY")"
          RESPONSE_FILE="agent_response_degraded.md"
          python core/ai/inference/query.py --offline "$QUESTION" > "$RESPONSE_FILE"
          if [ ! -s "$RESPONSE_FILE" ]; then
            echo "No se pudo generar respuesta (degraded)." > "$RESPONSE_FILE"
          fi
          echo "RESPONSE_FILE=$RESPONSE_FILE" >> $GITHUB_ENV

      - name: Post Answer (Degraded)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync(process.env.RESPONSE_FILE, 'utf8');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const commentBody = `🟡 **Ka0s Agent (modo degradado):** el runner self-hosted del agente puede estar sin capacidad. Esta es una respuesta provisional basada en repo/rules (sin acceder a la KB/LLM del cluster).\n\n---\n\n${response}\n\n---\n\n🔗 [Detalles de la Ejecución](${runUrl})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            })

  agent-reply:
    # Permitir ambas variantes de la etiqueta (con 'o' y con '0')
    if: contains(github.event.issue.labels.*.name, 'ka0s-agent') || contains(github.event.issue.labels.*.name, 'kaos-agent')
    name: Agent Reply
    runs-on: swarm-runners-scaleset
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install psycopg2-binary requests

      - name: Add Thinking Comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Ka0s Agent:** Procesando tu pregunta...\n\n🔗 [Ver Log de Ejecución](${runUrl}) (Job ID: ${context.runId})\n\n*(Estoy consultando la base de conocimientos y generando respuesta...)*`
            })

      - name: Query Agent
        id: query
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_IA_PASSWORD }}
          # Extraer el cuerpo de la issue como pregunta
          QUESTION_TITLE: ${{ github.event.issue.title }}
          QUESTION_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Procesando Issue #$ISSUE_NUMBER"

          QUESTION="$(printf "%s\n\n%s" "$QUESTION_TITLE" "$QUESTION_BODY")"
          
          # Limpiar el cuerpo de la issue para obtener solo la pregunta relevante
          # (Eliminar headers de markdown del template si es necesario, 
          #  por ahora pasamos todo el cuerpo ya que el LLM es bueno filtrando contexto)
          
          # Generar archivo temporal para la respuesta
          RESPONSE_FILE="agent_response.md"
          
          # Ejecutar inferencia
          # Nota: query.py imprime la respuesta a stdout
          python core/ai/inference/query.py "$QUESTION" > "$RESPONSE_FILE"
          
          # Verificar si se generó respuesta
          if [ ! -s "$RESPONSE_FILE" ]; then
            echo "Error: Respuesta vacía del agente."
            echo "Lo siento, hubo un error interno al procesar tu solicitud." > "$RESPONSE_FILE"
          fi
          
          # Exportar ruta
          echo "RESPONSE_FILE=$RESPONSE_FILE" >> $GITHUB_ENV

      - name: Post Answer
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync(process.env.RESPONSE_FILE, 'utf8');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            const commentBody = `🤖 **Ka0s Agent:** Aquí tienes la respuesta basada en mi conocimiento actual:\n\n---\n\n${response}\n\n---\n\n🔗 [Detalles de la Ejecución](${runUrl})\n*Si esta respuesta no es correcta, por favor verifica la documentación oficial o contacta con el equipo.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            })

      - name: Close Issue (Optional)
        # Opcional: Cerrar la issue automáticamente si se considera resuelta
        # Por ahora lo dejamos abierto para feedback del usuario
        if: success()
        run: echo "Respuesta enviada. Issue permanece abierta para feedback."

  handle-failure:
    if: failure()
    needs: [agent-reply]
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
    steps:
      - name: Report Error
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Error:** Hubo un problema técnico al procesar tu solicitud.\n\n🔗 [Ver Log de Error](${runUrl})\n\nEl equipo de Ka0s ha sido notificado.`
            })

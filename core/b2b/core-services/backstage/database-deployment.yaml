apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: backstage
  labels:
    app: postgresql
    core.kaos.io/type: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: "backstage"
            - name: POSTGRES_PASSWORD
              value: "backstage"
            - name: POSTGRES_DB
              value: "backstage_plugin_catalog" # Default DB, Backstage creates others as needed
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgresql-persistent-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgresql-persistent-storage
          persistentVolumeClaim:
            claimName: backstage-postgresql-pvc

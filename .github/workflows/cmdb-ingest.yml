name: CMDB Ingestion

on:
  push:
    paths:
      - 'devops/core/cmdb/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (no changes)'
        required: false
        type: boolean
        default: false

jobs:
  ingest-cmdb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Ingestion Script
        env:
          ITOP_URL: ${{ secrets.ITOP_URL || vars.ITOP_URL }}
          ITOP_USER: ${{ secrets.ITOP_USER }}
          ITOP_PASSWORD: ${{ secrets.ITOP_PASSWORD }}
        run: |
          echo "Starting CMDB Ingestion..."
          python core/scripts/cmdb_ingest.py --dir devops/core/cmdb

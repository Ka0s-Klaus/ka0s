    import json
    import os
    from typing import Any, Dict, List

    import psycopg2

    from common import utc_ts


    def _load_manifest(path: str) -> Dict[str, Any]:
        with open(path, "r", encoding="utf-8") as f:
            return json.load(f)


    def _save_manifest(path: str, manifest: Dict[str, Any]) -> None:
        manifest = dict(manifest)
        manifest["updated_at"] = utc_ts()
        with open(path, "w", encoding="utf-8") as f:
            json.dump(manifest, f, ensure_ascii=False, sort_keys=True)


    def _ensure_table(cur, dim: int) -> None:
        cur.execute("CREATE EXTENSION IF NOT EXISTS vector")
        cur.execute(
            f"""
            CREATE TABLE IF NOT EXISTS kaos_vectors (
              source TEXT NOT NULL,
              record_id TEXT NOT NULL,
              chunk_id INT NOT NULL,
              content TEXT NOT NULL,
              content_hash TEXT NOT NULL,
              embedding_model TEXT NOT NULL,
              embedding_dim INT NOT NULL,
              embedding vector({dim}) NOT NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              PRIMARY KEY (source, record_id, chunk_id, embedding_model)
            )
            """
        )


    def _upsert(cur, dim: int, rows: List[Dict[str, Any]]) -> int:
        sql = (
            """
            INSERT INTO kaos_vectors (source, record_id, chunk_id, content, content_hash, embedding_model, embedding_dim, embedding)
            VALUES (%s,%s,%s,%s,%s,%s,%s,%s)
            ON CONFLICT (source, record_id, chunk_id, embedding_model)
            DO UPDATE SET
              content = EXCLUDED.content,
              content_hash = EXCLUDED.content_hash,
              embedding_dim = EXCLUDED.embedding_dim,
              embedding = EXCLUDED.embedding,
              updated_at = NOW()
            """
        )
        count = 0
        for r in rows:
            cur.execute(
                sql,
                (
                    r["source"],
                    r["record_id"],
                    int(r["chunk_id"]),
                    r["content"],
                    r["content_hash"],
                    r["embedding_model"],
                    int(r.get("embedding_dim", dim)),
                    r["embedding"],
                ),
            )
            count += 1
        return count


    def main() -> None:
        spool_dir = os.environ.get("SPOOL_DIR", "/spool")
        dim = int(os.environ.get("EMBEDDING_DIM", "768"))

        conn = psycopg2.connect(
            host=os.environ["POSTGRES_IA_HOST"],
            port=int(os.environ.get("POSTGRES_IA_PORT", "5432")),
            dbname=os.environ["POSTGRES_IA_DB"],
            user=os.environ["POSTGRES_IA_USER"],
            password=os.environ["POSTGRES_IA_PASSWORD"],
        )
        conn.autocommit = True
        cur = conn.cursor()
        _ensure_table(cur, dim)

        loaded_total = 0
        for source in os.listdir(spool_dir):
            src_path = os.path.join(spool_dir, source)
            if not os.path.isdir(src_path):
                continue
            for run_id in sorted(os.listdir(src_path)):
                base = os.path.join(src_path, run_id)
                manifest_path = os.path.join(base, "manifest.json")
                vectors_path = os.path.join(base, "vectors.jsonl")
                done_path = os.path.join(base, "load.done")
                if not os.path.exists(manifest_path) or not os.path.exists(vectors_path):
                    continue
                if os.path.exists(done_path):
                    continue
                manifest = _load_manifest(manifest_path)
                if manifest.get("state") != "ready_for_load":
                    continue

                batch: List[Dict[str, Any]] = []
                with open(vectors_path, "r", encoding="utf-8") as f:
                    for line in f:
                        batch.append(json.loads(line))
                        if len(batch) >= 200:
                            loaded_total += _upsert(cur, dim, batch)
                            batch.clear()
                if batch:
                    loaded_total += _upsert(cur, dim, batch)

                with open(done_path, "w", encoding="utf-8") as f:
                    f.write(str(utc_ts()))
                manifest["state"] = "loaded"
                _save_manifest(manifest_path, manifest)

        print(f"loaded_total={loaded_total}")


    if __name__ == "__main__":
        main()

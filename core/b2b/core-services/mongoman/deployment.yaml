apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongoman
  labels:
    app: mongoman
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongoman
  template:
    metadata:
      labels:
        app: mongoman
    spec:
      containers:
        - name: mongoman
          image: ghcr.io/aientech/mongoman:latest
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongoman-secret
                  key: mongoman-uri
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: postgresql
  labels:
    app: postgresql
spec:
  serviceName: "postgresql"
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        role: primary
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgresql
        image: postgres:16-alpine # Revert to original image to fix version mismatch
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ka0s_admin
            - -d
            - ka0s_core
          initialDelaySeconds: 120 # Aumentado de 30s para dar tiempo al recovery
          periodSeconds: 20
          timeoutSeconds: 15 # Aumentado de 10s para evitar timeouts por I/O de Zabbix
          failureThreshold: 10 # Más intentos antes de reiniciar
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ka0s_admin
            - -d
            - ka0s_core
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 15 # Aumentado de 5s para evitar timeouts por I/O de Zabbix
          failureThreshold: 5
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      - name: zabbix-agent
        image: zabbix/zabbix-agent2:ubuntu-7.0-latest
        ports:
        - containerPort: 10050
          name: zabbix-agent
        env:
        - name: ZBX_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ZBX_SERVER_HOST
          value: "zabbix-server.zabbix.svc.cluster.local"
        - name: ZBX_METADATA
          value: "postgresql"
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_URI
          value: "tcp://localhost:5432"
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_DBNAME
          value: "ka0s_core"
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      tolerations:
        - key: restricted
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: k8-node-30
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 10Gi

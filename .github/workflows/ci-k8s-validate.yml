name: "Ka0s CI Kubernetes Validation (Kubeval & Trivy) -> Main"
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
      - '!main'
    paths:
      - 'core/b2b/core-services/**'
      - '!core/b2b/core-services/kube/**'

permissions:
  contents: read

env:
  KAOS_MODULE: "CI-K8S-VALIDATION"
  KAOS_CODE: ${{ github.run_id }}

jobs:
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tools (Trivy & Kubeconform)
        run: |
          # Ensure pre-requisites are present (minimal runner support)
          if ! command -v curl &> /dev/null || ! command -v tar &> /dev/null; then
             echo "Installing curl and tar..."
             sudo apt-get update && sudo apt-get install -y curl tar
          fi

          # Install Trivy
          if ! command -v trivy &> /dev/null; then
            echo "Installing Trivy..."
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          fi
          
          # Install Kubeconform
          if ! command -v kubeconform &> /dev/null; then
            echo "Installing Kubeconform..."
            curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
            sudo mv kubeconform /usr/local/bin/
          fi

      - name: Run Validation Scan
        run: |
          mkdir -p audit/kube
          SAFE_BRANCH_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
          REPORT_FILE="audit/kube/validation-report-${SAFE_BRANCH_NAME}-${{ github.run_id }}.md"
          echo "REPORT_FILE=$REPORT_FILE" >> $GITHUB_ENV
          
          echo "# Kubernetes Manifest Validation Report" > "$REPORT_FILE"
          echo "- **Date**: $(date)" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" == "0000000000000000000000000000000000000000" ]; then BEFORE="HEAD~1"; fi
          
          CHANGED_SERVICES=$(git diff --name-only "$BEFORE" "$AFTER" | \
            grep "^core/b2b/core-services/" | \
            grep -v "^core/b2b/core-services/kube/" | \
            cut -d/ -f1-4 | sort | uniq)
            
          if [ -z "$CHANGED_SERVICES" ]; then
            echo "No relevant services changed." >> "$REPORT_FILE"
            exit 0
          fi
          
          for SERVICE in $CHANGED_SERVICES; do
            if [ ! -d "$SERVICE" ]; then continue; fi
            
            echo "## Service: $SERVICE" >> "$REPORT_FILE"
            
            # 1. Kubeconform (Structure)
            echo "### 1. Kubeconform (Structure)" >> "$REPORT_FILE"
            echo '```bash' >> "$REPORT_FILE"
            kubeconform -summary -ignore-missing-schemas "$SERVICE" >> "$REPORT_FILE" 2>&1 || true
            echo '```' >> "$REPORT_FILE"
            
            # 2. Trivy (Security)
            echo "### 2. Trivy (Security)" >> "$REPORT_FILE"
            echo '```bash' >> "$REPORT_FILE"
            trivy config --severity HIGH,CRITICAL "$SERVICE" >> "$REPORT_FILE" 2>&1 || true
            echo '```' >> "$REPORT_FILE"
          done

      - name: Commit Validation Report
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          git pull --rebase
          # Use shell variable for robustness
          echo "Committing report: $REPORT_FILE"
          
          if [ -f "$REPORT_FILE" ]; then
            git add "$REPORT_FILE"
          else
            echo "Error: Report file not found at $REPORT_FILE"
            exit 1
          fi

          if ! git diff --staged --quiet; then
            git commit -m "chore(ci): add validation report [skip ci]"
            # Fetch and rebase to handle race conditions
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin HEAD:"${{ github.ref_name }}"
          else
            echo "No changes to commit."
          fi

  handle-success:
    name: Handle Success
    needs: [validate-manifests]
    if: success()
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - run: echo "${{ env.KAOS_MODULE }} Success."

  handle-failure:
    name: Handle Failure
    needs: [validate-manifests]
    if: failure()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "Workflow ${{ github.workflow }} failed. Run ID: ${{ github.run_id }}"

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run inspector.yml \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}"

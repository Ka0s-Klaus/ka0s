apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
    core.kaos.io/type: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      containers:
        - name: nginx-sidecar
          image: nginx:alpine
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: tls-certs
              mountPath: /etc/nginx/ssl
              readOnly: true
        - name: backstage
          image: quay.io/janus-idp/backstage-showcase:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7007
          env:
            - name: POSTGRES_HOST
              value: postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: backstage
            - name: POSTGRES_PASSWORD
              value: backstage
            - name: NODE_ENV
              value: production
            - name: APP_CONFIG_app_baseUrl
              value: https://83.32.50.24:8082
            - name: APP_CONFIG_backend_baseUrl
              value: https://83.32.50.24:8082
            - name: APP_CONFIG_backend_cors_origin
              value: https://83.32.50.24:8082
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: AUTH_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: AUTH_GITHUB_CLIENT_ID
            - name: AUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: AUTH_GITHUB_CLIENT_SECRET
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: GITHUB_TOKEN
          volumeMounts:
            - name: app-config
              mountPath: /opt/app-root/src/app-config.production.yaml
              subPath: app-config.production.yaml
            - name: dynamic-plugins
              mountPath: /opt/app-root/src/dynamic-plugins-root
      volumes:
        - name: app-config
          configMap:
            name: backstage-app-config
        - name: nginx-config
          configMap:
            name: backstage-nginx-config
        - name: tls-certs
          secret:
            secretName: backstage-tls
        
        - name: dynamic-plugins
          configMap:
            name: backstage-dynamic-plugins 

name: 🐛 Reporte de Bug
description: Crea un reporte para ayudarnos a mejorar Ka0s.
title: "[BUG]: <Descripción corta del error>"
labels: ["bug", "triage"]
projects: ["Ka0s-Klaus/4"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
          <img src="https://raw.githubusercontent.com/Ka0s-Klaus/ka0s/main/core/imgs/logo-ka0s.png" width="300" />
        </div>

        Gracias por tomarte el tiempo de reportar un error.

  - type: textarea
    id: description
    attributes:
      label: Descripción del Error
      description: Explica qué sucedió y qué esperabas que sucediera.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para Reproducir
      description: Lista los pasos para reproducir el comportamiento.
      placeholder: |
        1. Ejecutar el workflow '...'
        2. Con los parámetros '...'
        3. Ver error en logs...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs o Capturas
      description: Pega los logs relevantes o adjunta capturas de pantalla.
      render: shell

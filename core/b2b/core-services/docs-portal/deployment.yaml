apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-portal
  namespace: docs-portal
  labels:
    app: docs-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-portal
  template:
    metadata:
      labels:
        app: docs-portal
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: repo-volume
          emptyDir: {}
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: git-clone
          image: alpine/git
          securityContext:
            runAsUser: 0
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: git-credentials
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              git clone --depth 1 https://x-access-token:${GIT_TOKEN}@github.com/Ka0s-Klaus/ka0s.git /repo
              chown -R 1000:1000 /repo
          volumeMounts:
            - name: repo-volume
              mountPath: /repo
      containers:
        - name: docs-portal
          image: squidfunk/mkdocs-material:latest
          imagePullPolicy: Always
          command: ["mkdocs", "serve", "-f", "/repo/mkdocs.yml", "-a", "0.0.0.0:8000"]
          securityContext:
            runAsUser: 1000
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: repo-volume
              mountPath: /repo
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
    managed-by: ka0s-core-cd
spec:
  serviceName: openclaw
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
        managed-by: ka0s-core-cd
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: seed-config
          image: busybox
          command: ["sh", "-lc"]
          args:
            - >-
              set -e;
              mkdir -p /data/workspace;
              CFG=/data/openclaw.json;
              if [ ! -s "$CFG" ]; then cp /seed/openclaw.json "$CFG"; fi;
              for f in SOUL.md USER.md TOOLS.md AGENTS.md; do
                if [ ! -f "/data/workspace/$f" ]; then cp "/seed/$f" "/data/workspace/$f"; fi;
              done
          volumeMounts:
            - name: openclaw-data
              mountPath: /data
            - name: openclaw-config
              mountPath: /seed
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always
          command: ["openclaw", "gateway", "run", "--allow-unconfigured"]
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
          ports:
            - name: http
              containerPort: 18789
            - name: bridge
              containerPort: 18791
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-pvc
        - name: openclaw-config
          configMap:
            name: openclaw-config

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        ka0s.io/ollama-node: "true"
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        env:
        - name: OLLAMA_NUM_PARALLEL
          value: "1"
        - name: OLLAMA_MAX_QUEUE
          value: "10"
        - name: OLLAMA_KEEP_ALIVE
          value: "5m"
        - name: OLLAMA_FLASH_ATTENTION
          value: "1"
        - name: OLLAMA_HOST
          value: "0.0.0.0"
        - name: OLLAMA_ORIGINS
          value: "*"
        - name: OLLAMA_KV_CACHE_TYPE
          value: "q8_0" # Reduce memory usage for context windows
        resources:
          requests:
            memory: "6Gi"
            cpu: "1"
          limits:
            memory: "10Gi" # Prevent OOMKilled by limiting to 10GB
            gpu.intel.com/i915: 1
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      volumes:
      - name: models
        persistentVolumeClaim:
        # Note: This claim name must match the PVC name
          claimName: ollama-pvc

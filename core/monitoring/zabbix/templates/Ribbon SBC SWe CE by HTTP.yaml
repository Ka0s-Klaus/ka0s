          key: ribbon.fs.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FS}'
                value: '{$RIBBON.FS.DISCOVERY.NAME.MATCHES}'
              - macro: '{#FS}'
                value: '{$RIBBON.FS.DISCOVERY.NAME.NOT_MATCHES}'

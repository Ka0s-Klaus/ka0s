name: "Ka0s Agent Query"

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Pregunta para el Agente Ka0s'
        required: false
        default: '¿Cómo despliego un nuevo servicio?'
      issue_number:
        description: 'Número de Issue a analizar (opcional)'
        required: false
      reason:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Consulta manual al agente'

permissions:
  contents: write
  issues: write
  actions: write

env:
  KAOS_MODULE: "[Ka0S] Agent Query"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}
  POSTGRES_HOST: postgresql-ia.postgresql-ia.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ka0s_memory"
  POSTGRES_USER: "ka0s_ai"
  OLLAMA_HOST: ollama.ollama.svc.cluster.local
  OLLAMA_PORT: "11434"
  EMBEDDING_MODEL: "nomic-embed-text"
  GENERATION_MODEL: "llama3.1:8b" # Modelo ligero pero más inteligente para respuestas coherentes

jobs:
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install psycopg2-binary requests mcp pydantic

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli

      - name: Ollama Preflight (Models)
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          host = os.environ.get('OLLAMA_HOST', 'localhost')
          port = os.environ.get('OLLAMA_PORT', '11434')
          base = f"http://{host}:{port}"

          required = [
            os.environ.get('GENERATION_MODEL', '').strip(),
            os.environ.get('EMBEDDING_MODEL', '').strip(),
          ]
          required = [m if ':' in m else m + ':latest' for m in required if m]

          def req(url, data=None):
            if data is None:
              r = urllib.request.Request(url, method='GET')
            else:
              r = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type':'application/json'}, method='POST')
            # Timeout de 300s para permitir pulls largos
            with urllib.request.urlopen(r, timeout=300) as resp:
              return resp.status, resp.read().decode('utf-8', errors='ignore')

          try:
            status, body = req(base + '/v1/models')
          except Exception as e:
            print(f"ERROR: no se pudo consultar {base}/v1/models: {e}")
            sys.exit(1)

          payload = json.loads(body)
          ids = set(str(i.get('id')) for i in payload.get('data', []) if isinstance(i, dict) and i.get('id'))

          missing = [m for m in required if m not in ids]
          if not missing:
            print('OK: modelos presentes')
            sys.exit(0)

          print('WARN: faltan modelos, intentando pull via /api/pull:', ', '.join(missing))
          for m in missing:
            try:
              s, b = req(base + '/api/pull', {'name': m, 'stream': False})
              print(f"pull {m}: http={s}")
            except Exception as e:
              print(f"ERROR: pull {m} falló: {e}")
              sys.exit(1)

          status2, body2 = req(base + '/v1/models')
          payload2 = json.loads(body2)
          ids2 = set(str(i.get('id')) for i in payload2.get('data', []) if isinstance(i, dict) and i.get('id'))
          still = [m for m in required if m not in ids2]
          if still:
            print('ERROR: modelos aún ausentes tras pull:', ', '.join(still))
            sys.exit(1)
          print('OK: modelos presentes tras pull')
          PY

      - name: Query Agent
        id: query
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_IA_PASSWORD }}
          QUESTION: ${{ inputs.question }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Si se proporciona una issue, extraemos su contenido y lo unimos a la pregunta
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "Extrayendo contexto de la Issue #$ISSUE_NUMBER..."
            ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER --json title -q .title)
            ISSUE_BODY=$(gh issue view $ISSUE_NUMBER --json body -q .body)
            QUESTION="Por favor, analiza la siguiente Issue (#$ISSUE_NUMBER - $ISSUE_TITLE) y proporciona una solución o diagnóstico:
            
            CONTENIDO DE LA ISSUE:
            $ISSUE_BODY
            
            PREGUNTA ADICIONAL: $QUESTION"
          fi
          
          echo "Pregunta Final: $QUESTION"
          
          # Generar nombre de archivo único
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          SAFE_QUESTION=$(echo "${{ inputs.question }}" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-30)
          FILENAME="${TIMESTAMP}_${{ github.run_id }}_${SAFE_QUESTION}.md"
          FILEPATH="audit/response/$FILENAME"
          
          mkdir -p audit/response
          
          # Ejecutar script y capturar salida
          echo "# Respuesta del Agente Ka0s" > "$FILEPATH"
          echo "" >> "$FILEPATH"
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "**Issue Analizada:** #$ISSUE_NUMBER" >> "$FILEPATH"
          fi
          echo "**Pregunta:** ${{ inputs.question }}" >> "$FILEPATH"
          echo "**Fecha:** $(date)" >> "$FILEPATH"
          echo "**Workflow ID:** ${{ github.run_id }}" >> "$FILEPATH"
          echo "" >> "$FILEPATH"
          echo "---" >> "$FILEPATH"
          echo "" >> "$FILEPATH"
          
          # Ejecutar inferencia
          python core/ai/inference/query.py "$QUESTION" >> "$FILEPATH"
          
          # Mostrar respuesta en el log del workflow
          cat "$FILEPATH"
          
          # Exportar variable para el siguiente paso
          echo "FILEPATH=$FILEPATH" >> $GITHUB_ENV

      - name: Commit Response
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          git pull
          git add ${{ env.FILEPATH }}
          
          git commit -m "chore(ai): add agent response ${{ github.run_id }} [skip ci]"
          
          # Reintento robusto de push
          count=0
          MAX_RETRIES=5
          until [ $count -ge $MAX_RETRIES ]; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "✅ Push exitoso"
              exit 0
            fi
            echo "⚠️ Push fallido. Reintentando pull --rebase..."
            git pull --rebase origin ${{ github.ref_name }}
            ((count++))
            sleep 5
          done
          echo "❌ Error crítico: No se pudo hacer push después de $MAX_RETRIES intentos."
          exit 1

  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          # Estandarización de inputs para inspector.yml
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ needs.core-execution.outputs.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

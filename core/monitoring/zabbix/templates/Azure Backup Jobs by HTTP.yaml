            - lld_macro: '{#JOB.OPERATION}'
              path: $.operation
            - lld_macro: '{#JOB.STATUS}'
              path: $.status
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  const job_list = JSON.parse(value);
                  
                  const result = job_list.jobs.map(function (job) {
                  	return {
                  	  'name': job.name,
                  	  'entity_friendly_name': job.properties.entityFriendlyName,
                  	  'status': job.properties.status,
                  	  'operation': job.properties.operation
                  	};
                  });
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h

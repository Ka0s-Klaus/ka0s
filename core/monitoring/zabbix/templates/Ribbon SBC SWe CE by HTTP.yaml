      macros:
        - macro: '{$RIBBON.CE.NAME}'
          description: 'Ribbon SBC CE name.'
          config:
            type: TEXT
            priority: '5'
            label: 'Ribbon SBC CE name'
            description: 'Set the Ribbon SBC CE name here.'
        - macro: '{$RIBBON.CPU.UTIL.CRIT}'
          value: '90'
          description: 'The threshold of CPU usage in percent.'
          config:
            type: TEXT
            priority: '6'
            section_name: Thresholds
            label: 'Warning CPU usage threshold'
            description: 'Set the CPU usage threshold in percent. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$RIBBON.DISK.UTIL.CRIT}'
          value: '90'
          description: 'The threshold of disk usage in percent.'
          config:
            type: TEXT
            priority: '9'
            section_name: Thresholds
            label: 'Warning disk usage threshold'
            description: 'Set the disk usage threshold in percent. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$RIBBON.FS.DISCOVERY.NAME.MATCHES}'
          value: '.*'
          description: 'Sets the regex string of file system names to be allowed in discovery.'
          config:
            type: TEXT
            priority: '11'
            section_name: Filters
            label: 'Include file system name filter'
            description: 'Regex string to include file system by names.'
        - macro: '{$RIBBON.FS.DISCOVERY.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Sets the regex string of file system names to be ignored in discovery.'
          config:

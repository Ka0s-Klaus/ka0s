name: Ka0S Version
on:
  pull_request:
    types: [closed]
    branches:
      - 'main'

permissions:
  contents: write
  issues: write
  actions: write

env:
  KAOS_MODULE: "[Ka0S] VERSION"
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  KAOS_BOT_NAME: ${{ secrets.KAOS_BOT_NAME }}
  KAOS_BOT_EMAIL: ${{ secrets.KAOS_BOT_EMAIL }}

jobs:
  version-bump:
    if: github.event.pull_request.merged == true
    runs-on: swarm-runners-scaleset-ka0s
    outputs:
      NEW_VERSION: ${{ steps.calculate.outputs.NEW_VERSION }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli

      - name: Determine Version Increment
        id: calculate
        run: |
          # Obtener rama origen y versión actual
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          CURRENT_VERSION=$(cat version.txt 2>/dev/null || echo "0.0.0")
          
          echo "Current Version: $CURRENT_VERSION"
          echo "Source Branch: $SOURCE_BRANCH"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          # Lógica de incremento basada en prefijos estándar (Best Practices)
          if [[ "$SOURCE_BRANCH" == release/* ]] || [[ "$SOURCE_BRANCH" == major/* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            TYPE="Major"
          elif [[ "$SOURCE_BRANCH" == feat/* ]] || [[ "$SOURCE_BRANCH" == feature/* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            TYPE="Minor"
          elif [[ "$SOURCE_BRANCH" == fix/* ]] || [[ "$SOURCE_BRANCH" == hotfix/* ]] || [[ "$SOURCE_BRANCH" == bugfix/* ]]; then
            PATCH=$((PATCH + 1))
            TYPE="Patch"
          else
            # Default fallback (Patch) o mantener lógica legacy H/F si se desea
            # Por seguridad y best practices, asumimos patch para otros cambios
            PATCH=$((PATCH + 1))
            TYPE="Patch (Default)"
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New Version: $NEW_VERSION ($TYPE)"
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_TYPE=$TYPE" >> $GITHUB_ENV

      - name: Update Version Files
        id: update_files
        env:
          NEW_VERSION: ${{ steps.calculate.outputs.NEW_VERSION }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Actualizar version.txt
          echo "$NEW_VERSION" > version.txt
          
          # Actualizar CHANGELOG.md
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          ENTRY="## Version $NEW_VERSION
          - **Date**: $DATE
          - **Type**: ${{ env.VERSION_TYPE }}
          - **PR**: #$PR_NUMBER $PR_TITLE
          - **Author**: @$PR_AUTHOR
          ---------------------------------"
          
          # Prepend (o append inteligente, aquí hacemos append simple al final como estaba, 
          # pero idealmente sería prepend. El script original hacía append.)
          # Vamos a mantener el append para no romper el formato existente masivo.
          echo "$ENTRY" >> CHANGELOG.md
          
          # Actualizar INDEX_VERSION.md
          if [ ! -f INDEX_VERSION.md ]; then echo "# Version Index" > INDEX_VERSION.md; fi
          echo "- **Version**: $NEW_VERSION - **Description**: $PR_TITLE" >> INDEX_VERSION.md
          
          echo "Files updated."

      - name: Commit and Push
        env:
          NEW_VERSION: ${{ steps.calculate.outputs.NEW_VERSION }}
        run: |
          git config --global user.name "${{ env.KAOS_BOT_NAME }}"
          git config --global user.email "${{ env.KAOS_BOT_EMAIL }}"
          
          git add version.txt CHANGELOG.md INDEX_VERSION.md
          git commit -m "${{ env.KAOS_MODULE }} Bump version to $NEW_VERSION"
          
          # Crear Tag
          git tag -a "$NEW_VERSION" -m "Version $NEW_VERSION"
          
          # Push Atomic
          git push origin main
          git push origin "$NEW_VERSION"

      - name: Create Release (Optional)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.calculate.outputs.NEW_VERSION }}
          name: Version ${{ steps.calculate.outputs.NEW_VERSION }}
          body: |
            ## Changes
            ${{ github.event.pull_request.title }}
            
            **Author**: @${{ github.event.pull_request.user.login }}
            **PR**: #${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  handle-success:
    needs: [version-bump]
    if: success()
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - name: Notify Success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ needs.version-bump.outputs.NEW_VERSION }}
        run: |
          gh issue comment ${{ github.event.pull_request.number }} --body "🚀 **Versión $NEW_VERSION publicada correctamente.**"

  handle-failure:
    needs: [version-bump]
    if: failure()
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - name: Notify Failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.pull_request.number }} --body "❌ **Fallo en el versionado automático.** Por favor revisa los logs."
          # Aquí se podría integrar la creación de incidente estándar de Ka0s

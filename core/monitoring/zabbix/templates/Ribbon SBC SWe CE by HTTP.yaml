                - type: TRIM
                  parameters:
                    - KBytes
                - type: MULTIPLIER
                  parameters:
                    - '1024'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: ribbon.server.data.get
              tags:
                - tag: component
                  value: storage
                - tag: fs

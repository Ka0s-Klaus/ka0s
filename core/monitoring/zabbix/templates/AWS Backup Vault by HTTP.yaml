          master_item:
            key: aws.backup_vault.job.get
          lld_macro_paths:
            - lld_macro: '{#AWS.BACKUP_JOB.ID}'
              path: $.job_id
            - lld_macro: '{#AWS.BACKUP_JOB.RESOURCE_NAME}'
              path: $.resource_name
            - lld_macro: '{#AWS.BACKUP_JOB.RESOURCE_TYPE}'
              path: $.resource_type
            - lld_macro: '{#AWS.BACKUP_JOB.STATE}'
              path: $.job_state
            - lld_macro: '{#AWS.BACKUP_JOB.TYPE}'
              path: $.job_type
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          overrides:
            - name: 'Copy job excludes'
              step: '1'
              filter:
                conditions:
                  - macro: '{#AWS.BACKUP_JOB.TYPE}'
                    value: '^copy-job&'
              operations:
                - operationobject: TRIGGER_PROTOTYPE
                  operator: LIKE
                  value: 'Job aborted'
                  discover: NO_DISCOVER
                - operationobject: TRIGGER_PROTOTYPE
                  operator: LIKE
                  value: 'Job expired'
                  discover: NO_DISCOVER
            - name: 'Restore job excludes'
              step: '2'
              filter:
                conditions:
                  - macro: '{#AWS.BACKUP_JOB.TYPE}'
                    value: '^restore-job&'
              operations:
                - operationobject: TRIGGER_PROTOTYPE
                  operator: LIKE
                  value: 'Job expired'
                  discover: NO_DISCOVER
                - operationobject: TRIGGER_PROTOTYPE
                  operator: LIKE
                  value: 'Job partially completed'
                  discover: NO_DISCOVER

name: Ka0s Agent Ingest (Nightly Full)

on:
  schedule:
    - cron: '0 2 * * *' # Ejecutar a las 2:00 AM UTC todos los días
  workflow_dispatch: # Permite ejecución manual bajo demanda

jobs:
  ingest-full:
    runs-on: swarm-runners-scaleset
    timeout-minutes: 360 # Aumentamos timeout a 6 horas para ingesta completa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install psycopg2-binary langchain-community langchain-huggingface nomic sentence-transformers

      - name: Run Full Ingestion (All Modules)
        env:
          DB_HOST: "postgres-ia.core-services.svc.cluster.local"
          DB_PORT: "5432"
          DB_NAME: "kaos_memory"
          DB_USER: "postgres"
          DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # Ejecutamos secuencialmente para controlar carga y logs
          echo "::group::Ingesting Skills & Rules"
          python core/ai/memory/ingest_local.py --module skills
          echo "::endgroup::"

          echo "::group::Ingesting Documentation"
          python core/ai/memory/ingest_local.py --module docs
          echo "::endgroup::"

          echo "::group::Ingesting Infrastructure (Core)"
          python core/ai/memory/ingest_local.py --module infra
          echo "::endgroup::"

          echo "::group::Ingesting DevOps Scripts"
          python core/ai/memory/ingest_local.py --module devops
          echo "::endgroup::"

          echo "::group::Ingesting GitHub Config"
          python core/ai/memory/ingest_local.py --module github
          echo "::endgroup::"

          echo "::group::Ingesting Compliance"
          python core/ai/memory/ingest_local.py --module compliance
          echo "::endgroup::"

          echo "::group::Ingesting Audit Logs (Recent)"
          # Audit puede ser muy grande, idealmente filtraríamos por fecha, 
          # pero por ahora ingerimos todo lo que el patrón capture.
          python core/ai/memory/ingest_local.py --module audit
          echo "::endgroup::"
          
          # Code se deja al final por ser el más pesado
          echo "::group::Ingesting Source Code"
          python core/ai/memory/ingest_local.py --module code
          echo "::endgroup::"

name: Ka0s Agent Ingest (Unified)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to ingest (docs, skills, infra, code, compliance, devops, github, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - docs
          - skills
          - infra
          - code
          - compliance
          - devops
          - github
          - all
  schedule:
    - cron: '0 2 * * *' # Nightly Full Ingest (2:00 AM UTC)
  push:
    paths-ignore:
      - 'audit/**'
      - 'site_build/**'

permissions:
  contents: read
  issues: write # Required for handle-failure
  actions: write # Required for end-workflow trigger

env:
  KAOS_MODULE: "Agent Ingest"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}
  # Global DB Config
  # Corrected DNS: service_name.namespace.svc.cluster.local
  DB_HOST: "postgresql-ia.postgresql-ia.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "kaos_memory"
  DB_USER: "ka0s_ai" # Corrected user from secret
  
  # Global AI Config (Ollama)
  # OLLAMA_HOST apunta al servicio de la "flota" dedicada a embeddings
  OLLAMA_HOST: "ollama-embed.ollama.svc.cluster.local"
  OLLAMA_PORT: "11434"
  # Secrets must be passed in jobs, but defined here for reference
  
jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION
  # -----------------------------------------------------------------------------
  core-execution:
    name: Ingest Execution
    runs-on: swarm-runners-scaleset
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Enable pip caching

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          # Only install what ingest_local.py actually imports (psycopg2 + requests)
          # Removed heavy ML libs (torch/transformers) since we use Ollama via HTTP
          pip install psycopg2-binary requests --prefer-binary

      # Lógica de detección de cambios exactos para ejecución automática por push
      - name: Determine Changed Files (Auto-Trigger)
        id: changed-files
        if: github.event_name == 'push'
        run: |
          # Obtenemos ficheros modificados, añadidos o eliminados
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          fi
          
          VALID_FILES=""
          for f in $FILES; do
            # Ignorar carpetas excluidas explícitamente.
            # Se incluyen ficheros borrados para que el script los elimine de la BD.
            if [[ "$f" != audit/* ]] && [[ "$f" != site_build/* ]]; then
              VALID_FILES="$VALID_FILES $f"
            fi
          done
          
          echo "files=$VALID_FILES" >> $GITHUB_OUTPUT

      - name: Set Module Variable
        id: set-var
        if: github.event_name != 'push'
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "TARGET_MODULE=all" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET_MODULE=${{ inputs.module }}" >> $GITHUB_ENV
          fi

      - name: DB Preflight
        env:
          DB_PASSWORD: ${{ secrets.POSTGRES_IA_PASSWORD || secrets.POSTGRES_PASSWORD }}
        run: |
          python - << 'PY'
          import os, sys, time
          import psycopg2
          host = os.environ.get("DB_HOST", "")
          port = int(os.environ.get("DB_PORT", "5432"))
          db = os.environ.get("DB_NAME", "")
          user = os.environ.get("DB_USER", "")
          password = os.environ.get("DB_PASSWORD", "")
          if not password:
            print("::error::DB_PASSWORD vacío. Configura el secret POSTGRES_IA_PASSWORD (o POSTGRES_PASSWORD) en el repo/entorno.")
            sys.exit(1)
          attempts = 30
          for i in range(1, attempts + 1):
            try:
              conn = psycopg2.connect(host=host, port=port, database=db, user=user, password=password, connect_timeout=5)
              conn.close()
              print("✅ DB reachable.")
              sys.exit(0)
            except Exception as e:
              if i == attempts:
                print(f"::error::No se pudo conectar a la DB {db} en {host}:{port} tras {attempts} intentos: {e}")
                sys.exit(1)
              time.sleep(5)
          PY

      - name: Run Ingestion
        env:
          DB_PASSWORD: ${{ secrets.POSTGRES_IA_PASSWORD || secrets.POSTGRES_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            FILES="${{ steps.changed-files.outputs.files }}"
            if [ -z "$FILES" ]; then
              echo "✅ No valid files to ingest outside of audit/ or site_build/."
              exit 0
            fi
            echo "🚀 Starting Ingestion for specific changed files: $FILES"
            python core/ai/memory/ingest_local.py --files $FILES
          else
            echo "🚀 Starting Ingestion for Module: $TARGET_MODULE"
            
            if [ "$TARGET_MODULE" == "all" ]; then
              # Ejecución secuencial ordenada para el Nightly/Full
              modules=("skills" "docs" "infra" "devops" "github" "compliance" "code")
              for mod in "${modules[@]}"; do
                echo "::group::Ingesting $mod"
                python core/ai/memory/ingest_local.py --module $mod
                echo "::endgroup::"
              done
            else
              # Ejecución puntual
              python core/ai/memory/ingest_local.py --module $TARGET_MODULE
            fi
          fi

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Ingestion for ${{ env.KAOS_MODULE }} completed successfully."

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - id: repo
        name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ needs.core-execution.result }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

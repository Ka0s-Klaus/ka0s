      discovery_rules:
        - uuid: e37ff9885d014939b9ea182ce2087e05
          name: 'Azure backup job discovery'
          type: DEPENDENT
          key: azure.vault.job.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#JOB.FRIENDLY.NAME}'
                value: '{$AZURE.JOBS.FRIENDLY.NAME.MATCHES}'
              - macro: '{#JOB.FRIENDLY.NAME}'
                value: '{$AZURE.JOBS.FRIENDLY.NAME.NOT.MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#JOB.OPERATION}'
                value: '{$AZURE.JOBS.OPERATION.MATCHES}'
              - macro: '{#JOB.OPERATION}'
                value: '{$AZURE.JOBS.OPERATION.NOT.MATCHES}'
                operator: NOT_MATCHES_REGEX
              - macro: '{#JOB.STATUS}'
                value: '{$AZURE.JOBS.STATUS.MATCHES}'
              - macro: '{#JOB.STATUS}'
                value: '{$AZURE.JOBS.STATUS.NOT.MATCHES}'
                operator: NOT_MATCHES_REGEX
          lifetime: '0'
          description: 'List of backup jobs in the vault.'
          item_prototypes:
            - uuid: 9a46651633ad45d69a2a931259d381ac
              name: 'Job status [{#JOB.FRIENDLY.NAME}, {#JOB.NAME}]'
              type: DEPENDENT
              key: 'azure.vault.job.status[{#JOB.NAME}]'
              description: |
                Job status.
                Possible values:
                0 - Unknown
                1 - In progress
                2 - Queued
                3 - Completed
                4 - Completed with warnings
                5 - Failed
                6 - Cancelled
                7 - Expired
              valuemap:
                name: 'Azure backup job status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.jobs[?(@.name == ''{#JOB.NAME}'')].properties.status.first()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      const idx = {
                      	'InProgress': 1,
                      	'Queued': 2,
                      	'Completed': 3,
                      	'CompletedWithWarnings': 4,
                      	'Failed': 5,
                      	'Cancelled': 6,
                      	'Expired': 7
                        };
                      
                        return typeof idx[value] === 'undefined' ? 0 : idx[value];
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: azure.vault.data.get
              tags:
                - tag: component
                  value: health
                - tag: resource
                  value: '{#JOB.FRIENDLY.NAME}'
              trigger_prototypes:
                - uuid: a3a8cb87e41546b0a6550375578cc651
                  expression: 'last(/Azure Backup Jobs by HTTP/azure.vault.job.status[{#JOB.NAME}])=6'
                  name: 'Azure backup jobs: Job cancelled [{#JOB.NAME}]'
                  event_name: 'Azure backup jobs: Job type [{#JOB.OPERATION}] for [{#JOB.FRIENDLY.NAME}] with ID [{#JOB.NAME}] has cancelled.'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'Job has received "Cancelled" status.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: 475a62e73f9c4a2abef6320c6909e7fa
                  expression: 'last(/Azure Backup Jobs by HTTP/azure.vault.job.status[{#JOB.NAME}])=4'
                  name: 'Azure backup jobs: Job completed with warnings [{#JOB.NAME}]'
                  event_name: 'Azure backup jobs: Job type [{#JOB.OPERATION}] for [{#JOB.FRIENDLY.NAME}] with ID [{#JOB.NAME}] has completed with warnings.'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'Job has received "Completed with warnings" status.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: b7e43dbcd4914f228bb0687f585951ea
                  expression: 'last(/Azure Backup Jobs by HTTP/azure.vault.job.status[{#JOB.NAME}])=7'
                  name: 'Azure backup jobs: Job expired [{#JOB.NAME}]'
                  event_name: 'Azure backup jobs: Job type [{#JOB.OPERATION}] for [{#JOB.FRIENDLY.NAME}] with ID [{#JOB.NAME}] has  expired.'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'Job has received "Expired" status.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: f340de23cd004f1b94239dbcf7ec136e
                  expression: 'last(/Azure Backup Jobs by HTTP/azure.vault.job.status[{#JOB.NAME}])=5'
                  name: 'Azure backup jobs: Job failed [{#JOB.NAME}]'
                  event_name: 'Azure backup jobs: Job type [{#JOB.OPERATION}] for [{#JOB.FRIENDLY.NAME}] with ID [{#JOB.NAME}] has failed.'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'Job has received "Failed" status.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: 860b6d8bbefd4daba537e517dfb94007
                  expression: 'last(/Azure Backup Jobs by HTTP/azure.vault.job.status[{#JOB.NAME}])=0'
                  name: 'Azure backup jobs: Job status unknown [{#JOB.NAME}]'
                  event_name: 'Azure backup jobs: Job type [{#JOB.OPERATION}] for [{#JOB.FRIENDLY.NAME}] with ID [{#JOB.NAME}] is in unknown status.'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'Job has received "Unknown" status.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
          master_item:

apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: zabbix
  labels:
    app: zabbix-web
    core.kaos.io/type: monitoring # Etiqueta de iTop adaptada
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.241
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: zabbix-web

apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
  namespace: llama-server
  labels:
    app: llama-server
    managed-by: ka0s-core-cd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
        managed-by: ka0s-core-cd
    spec:
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server
          imagePullPolicy: Always
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --model
            - /models/ka0s-local.gguf
            - --alias
            - ka0s-local
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "16Gi"
              cpu: "8000m"
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-models-pvc

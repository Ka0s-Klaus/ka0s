name: Ka0s Agent Ingest (Unified)

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to ingest (docs, skills, infra, code, compliance, devops, github, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - docs
          - skills
          - infra
          - code
          - compliance
          - devops
          - github
          - all
  schedule:
    - cron: '0 2 * * *' # Nightly Full Ingest (2:00 AM UTC)
  push:
    paths:
      - 'compliance/trae/skills/**'
      - 'compliance/trae/rules/**'
      - 'core/docs/**'
      - 'core/b2b/**'
      - '.github/workflows/**'

permissions:
  contents: read
  issues: write # Required for handle-failure
  actions: write # Required for end-workflow trigger

env:
  KAOS_MODULE: "Agent Ingest"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}
  # Global DB Config
  # Corrected DNS: service_name.namespace.svc.cluster.local
  DB_HOST: "postgresql-ia.postgresql-ia.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "kaos_memory"
  DB_USER: "ka0s_ai" # Corrected user from secret
  
  # Global AI Config (Ollama)
  OLLAMA_HOST: "ollama.ollama.svc.cluster.local"
  OLLAMA_PORT: "11434"
  # Secrets must be passed in jobs, but defined here for reference
  
jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION
  # -----------------------------------------------------------------------------
  core-execution:
    name: Ingest Execution
    runs-on: swarm-runners-scaleset
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Enable pip caching

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          # Only install what ingest_local.py actually imports (psycopg2 + requests)
          # Removed heavy ML libs (torch/transformers) since we use Ollama via HTTP
          pip install psycopg2-binary requests --prefer-binary

      # Lógica de detección de cambios para ejecución automática por push
      - name: Determine Module (Auto-Trigger)
        id: determine-module
        if: github.event_name == 'push'
        run: |
          # Prioridad: Skills > Docs > Infra
          if git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "^.trae/"; then
            echo "module=skills" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "^core/docs/"; then
            echo "module=docs" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep -q "^core/b2b/"; then
            echo "module=infra" >> $GITHUB_OUTPUT
          else
            echo "module=infra" >> $GITHUB_OUTPUT
          fi

      - name: Set Module Variable
        id: set-var
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "TARGET_MODULE=all" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET_MODULE=${{ inputs.module }}" >> $GITHUB_ENV
          else
            echo "TARGET_MODULE=${{ steps.determine-module.outputs.module }}" >> $GITHUB_ENV
          fi

      - name: Run Ingestion
        env:
          DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          echo "🚀 Starting Ingestion for Module: $TARGET_MODULE"
          
          if [ "$TARGET_MODULE" == "all" ]; then
            # Ejecución secuencial ordenada para el Nightly/Full
            # Audit removed as it's handled by CronJobs
            modules=("skills" "docs" "infra" "devops" "github" "compliance" "code")
            for mod in "${modules[@]}"; do
              echo "::group::Ingesting $mod"
              python core/ai/memory/ingest_local.py --module $mod
              echo "::endgroup::"
            done
          else
            # Ejecución puntual
            python core/ai/memory/ingest_local.py --module $TARGET_MODULE
          fi

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Ingestion for ${{ env.KAOS_MODULE }} completed successfully."

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - id: repo
        name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ needs.core-execution.result }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

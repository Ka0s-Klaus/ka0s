name: 🧩 Problema (Problem)
description: Declara un problema raíz para su investigación y seguimiento en iTop.
title: "[PROBLEM]: "
labels: ["itop-problem", "triage"]
projects: ["Ka0s-Klaus/4"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
          <img src="https://raw.githubusercontent.com/Ka0s-Klaus/ka0s/main/core/imgs/logo-ka0s.png" width="300" />
        </div>

        Usa esta plantilla para problemas raíz que requieren análisis permanente.

  - type: dropdown
    id: organization
    attributes:
      label: Organizacion
      description: (mandatory en iTop)
      options:
        - Ka0s Inc
        - Test 1
        - Test 2
    validations:
      required: true

  - type: input
    id: requester
    attributes:
      label: Solicitante
      description: (Caller en iTop, opcional)
      placeholder: "@ka0sc0re"

  - type: dropdown
    id: origin
    attributes:
      label: Origen
      options:
        - Portal
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impacto
      description: (mandatory)
      options:
        - Department
        - Service
        - Person
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgencia
      description: (mandatory)
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true

  - type: input
    id: service
    attributes:
      label: Servicio / CI
      description: (nombre visible en iTop)

  - type: input
    id: service_subcategory
    attributes:
      label: Subcategoría de Servicio (Service Subcategory)

  - type: input
    id: related_incidents
    attributes:
      label: Incidencias Relacionadas (URLs o IDs)
      description: Lista de incidencias GitHub/iTop relacionadas.

  - type: textarea
    id: description
    attributes:
      label: Descripción (mandatory)
      description: ¿Qué patrón observas? ¿Cuál podría ser la causa raíz?
    validations:
      required: true

  - type: input
    id: product
    attributes:
      label: Producto (si aplica)

  - type: input
    id: related_change
    attributes:
      label: Cambio Relacionado (Change)

  - type: input
    id: team
    attributes:
      label: Equipo (Team responsable, si aplica)

  - type: input
    id: agent
    attributes:
      label: Agente (Person asignada, si aplica)

  - type: textarea
    id: hypothesis
    attributes:
      label: Hipótesis
      description: Posibles causas o áreas a investigar.

  - type: textarea
    id: plan
    attributes:
      label: Plan de Investigación
      description: Pasos, owners y métricas.

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-ia
  namespace: postgresql-ia
  labels:
    app: postgresql-ia
spec:
  serviceName: "postgresql-ia"
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-ia
  template:
    metadata:
      labels:
        app: postgresql-ia
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgresql
        image: ankane/pgvector:v0.5.1 # PG15 with vector support
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_USER
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_DB
        - name: POSTGRES_HOST_AUTH_METHOD
          value: "trust"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ka0s_ai
            - -d
            - ka0s_memory
          initialDelaySeconds: 120 # Increased to allow initdb to complete
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ka0s_ai
            - -d
            - ka0s_memory
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: postgres-ia-data
          mountPath: /var/lib/postgresql/data
      nodeSelector:
        kubernetes.io/hostname: k8-node-20
  volumeClaimTemplates:
  - metadata:
      name: postgres-ia-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 10Gi

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: zabbix
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: zabbix-web-branding
    files:
      - zabbix_logo.png=branding/Ka0s Logo.png
      - zabbix_logo_compact.png=branding/logochico.png
      - favicon.png=branding/FaviconKa0s.png
resources:
  - namespace.yaml
  - zabbix-server-nfs-pvc.yaml
  - zabbix-server-deployment.yaml
  - zabbix-server-service.yaml
  - zabbix-agent2-configmap.yaml
  - zabbix-agent-daemonset.yaml
  - zabbix-agent-service.yaml
  - zabbix-scripts.yaml
  - zabbix-k8s-rbac.yaml
  - zabbix-web-deployment.yaml
  - zabbix-web-service.yaml
  - ingress.yaml

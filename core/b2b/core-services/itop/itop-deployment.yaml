apiVersion: apps/v1
kind: Deployment
metadata:
  name: itop
  namespace: itop
  labels:
    app: itop
    core.kaos.io/type: b2b-core
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: itop
  template:
    metadata:
      labels:
        app: itop
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8-node-20
      initContainers:
        - name: init-itop-files
          image: vbkunin/itop:latest-base
          command: 
            - 'sh'
            - '-c'
            - |
              if [ ! -f /web-data/conf/production/config-itop.php ]; then
                echo "Initializing iTop files..."
                cp -r /var/www/html/. /web-data/
              else
                echo "Config file exists, preserving configuration..."
                # Only sync code, preserve config
                cp -r /var/www/html/application /web-data/
                cp -r /var/www/html/core /web-data/
                cp -r /var/www/html/css /web-data/
                cp -r /var/www/html/data /web-data/
                cp -r /var/www/html/datamodels /web-data/
                cp -r /var/www/html/dictionaries /web-data/
                cp -r /var/www/html/env-production /web-data/
                cp -r /var/www/html/images /web-data/
                cp -r /var/www/html/js /web-data/
                cp -r /var/www/html/lib /web-data/
                cp -r /var/www/html/pages /web-data/
                cp -r /var/www/html/portal /web-data/
                cp -r /var/www/html/setup /web-data/
                cp -r /var/www/html/sources /web-data/
                cp -r /var/www/html/webservices /web-data/
                cp -r /var/www/html/index.php /web-data/
              fi && \
              if [ -f /web-data/conf/production/config-itop.php ]; then \
                 echo "Setting correct app_root_url in config-itop.php..." && \
                 chmod 660 /web-data/conf/production/config-itop.php && \
                 if grep -q "'app_root_url' =>" /web-data/conf/production/config-itop.php; then
                   sed -i "s|'app_root_url' => .*|'app_root_url' => 'https://itsm.ka0s.io/',|" /web-data/conf/production/config-itop.php;
                 fi
              fi && \
              echo "Applying custom branding..." && \
              mkdir -p /web-data/images && \
              if [ -f /branding/favicon.png ]; then
                 find /web-data -type f \( -name "favicon.ico" -o -name "apple-touch-icon*.png" -o -name "ms-tile*.png" -o -name "touch-icon*.png" \) -exec cp /branding/favicon.png {} \; 2>/dev/null || true;
               fi && \
               if [ -f /branding/custom_logo.png ]; then \
                 cp /branding/custom_logo.png /web-data/images/custom_logo.png; \
                 # Force copy custom_logo_compact.png
                 if [ -f /branding/custom_logo_compact.png ]; then
                   cp /branding/custom_logo_compact.png /web-data/images/custom_logo_compact.png;
                 fi
                 # Also replace the actual file itop-logo-square.png if it exists, to be double sure
                 find /web-data/images -name "itop-logo-square.png" -exec cp /branding/custom_logo_compact.png {} \; || true;
                 # Replace ALL png logos related to iTop
                 find /web-data/images -type f \( -iname '*itop*.png' -o -iname '*logo*.png' \) -exec cp /branding/custom_logo.png {} \; ; \
                 find /web-data -name "*.css" -type f -exec sh -c 'printf "\n.ibo-navigation-menu--logo img, .ibo-header__logo img, #login-logo img { opacity: 0; }\n.ibo-navigation-menu--logo, .ibo-header__logo, #login-logo a { background-image: url(../images/custom_logo.png) !important; background-repeat: no-repeat !important; background-size: 250px !important; background-position: left center !important; width: 220px !important; height: 56px !important; display: block; }\n.ibo-is-collapsed .ibo-navigation-menu--logo, .ibo-navigation-menu--minified .ibo-navigation-menu--logo { background-image: url(../images/custom_logo_compact.png) !important; background-size: contain !important; background-position: center center !important; width: 30px !important; height: 30px !important; display: block; margin-top: 10px; }\n" >> "$1"' -- {} \; || true; \
                 # Inject custom text for login page and footer (idempotent)
                  grep -rl "'UI:Login:Welcome'" /web-data \
                    | xargs -r sed -i "s|'UI:Login:Welcome' => '[^']*'|'UI:Login:Welcome' => 'Welcome to Ka0s!'|g" || true

                  grep -rl "'UI:Button:Login'" /web-data \
                    | xargs -r sed -i "s|'UI:Button:Login' => '[^']*'|'UI:Button:Login' => 'Enter to Ka0s'|g" || true

                  grep -rl "'UI:Footer:PoweredBy'" /web-data \
                    | xargs -r sed -i "s|'UI:Footer:PoweredBy' => '[^']*'|'UI:Footer:PoweredBy' => 'Ka0s Powered by iTop'|g" || true
                fi && \
              chmod -R 775 /web-data/conf && \
              chmod 444 /web-data/conf/production/config-itop.php && \
              chown -R 33:33 /web-data
          volumeMounts:
            - name: itop-web-persistent-storage
              mountPath: /web-data
            - name: itop-web-branding
              mountPath: /branding
      containers:
        - name: itop
          image: vbkunin/itop:latest-base
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          ports:
            - containerPort: 80
          env:
            - name: ITOP_DB_HOST
              value: "mysql.mysql.svc.cluster.local"
            - name: ITOP_DB_NAME
              value: "itop"
            - name: ITOP_DB_USER
              value: "itop"
            - name: ITOP_DB_PASSWORD
              value: "itop_secure_password"
          volumeMounts:
            - name: itop-web-persistent-storage
              mountPath: /var/www/html
      volumes:
        - name: itop-web-persistent-storage
          persistentVolumeClaim:
            claimName: itop-web-pvc
        - name: itop-web-branding
          configMap:
            name: itop-web-branding
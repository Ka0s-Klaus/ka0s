name: Ka0s Agent Promote Eval Case

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to promote"
        required: true
        type: string
      suite:
        description: "Target suite (docs|skills|rules|general)"
        required: true
        type: string
      issue_title:
        description: "(Opcional) Título de la issue (evita fetch por API)"
        required: false
        type: string
      issue_body:
        description: "(Opcional) Body completo de la issue (evita fetch por API)"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  KAOS_MODULE: "[Ka0S] Agent Promote Eval"
  KAOS_CODE: ${{ github.run_id }}

jobs:
  promote:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'ka0s-agent-promote-eval')
    runs-on: swarm-runners-scaleset
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install psycopg2-binary requests

      - name: Compute Inputs
        id: vars
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ inputs.issue_number }}"
            SUITE="${{ inputs.suite }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            SUITE="general"
            for l in ${{ join(github.event.issue.labels.*.name, ' ') }}; do
              case "$l" in
                eval-suite:docs) SUITE="docs";;
                eval-suite:skills) SUITE="skills";;
                eval-suite:rules) SUITE="rules";;
                eval-suite:general) SUITE="general";;
              esac
            done
          fi
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "suite=$SUITE" >> $GITHUB_OUTPUT

          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV

      - name: Promote Issue to Eval Case
        id: promote
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          DISPATCH_ISSUE_TITLE: ${{ inputs.issue_title }}
          DISPATCH_ISSUE_BODY: ${{ inputs.issue_body }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${DISPATCH_ISSUE_BODY:-}" ]; then
              python -c "import os; print(os.environ.get('DISPATCH_ISSUE_TITLE','')); print('---'); print(os.environ.get('DISPATCH_ISSUE_BODY',''))" > /tmp/issue.txt
            else
              python -c "import json, os, urllib.request; repo=os.environ.get('GITHUB_REPOSITORY'); issue_number=os.environ.get('ISSUE_NUMBER'); token=os.environ.get('GITHUB_TOKEN'); url=f'https://api.github.com/repos/{repo}/issues/{issue_number}'; req=urllib.request.Request(url, headers={'Accept':'application/vnd.github+json','Authorization':f'Bearer {token}'}); payload=json.loads(urllib.request.urlopen(req, timeout=30).read().decode('utf-8')); print(payload.get('title','')); print('---'); print(payload.get('body',''))" > /tmp/issue.txt
            fi
            ISSUE_TITLE=$(sed -n '1p' /tmp/issue.txt)
            ISSUE_BODY=$(sed -n '3,$p' /tmp/issue.txt)
            export ISSUE_TITLE
            export ISSUE_BODY
          fi
          TARGET=$(python core/ai/eval/promote_from_issue.py --issue-number "${{ steps.vars.outputs.issue_number }}" --suite "${{ steps.vars.outputs.suite }}")
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Run Offline Eval
        run: python core/ai/eval/run_eval.py

      - name: Create PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          ISSUE_NUMBER="${{ steps.vars.outputs.issue_number }}"
          SUITE="${{ steps.vars.outputs.suite }}"
          BRANCH="eval/issue-${ISSUE_NUMBER}-${SUITE}"

          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH" "origin/$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"
          git add "${{ steps.promote.outputs.target }}" || true
          if git diff --staged --quiet; then
            echo "has_changes=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git commit -m "test(agent): promote issue ${ISSUE_NUMBER} to eval suite (${SUITE})"
          git push -u origin "$BRANCH" --force-with-lease
          echo "has_changes=1" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create PR (API)
        if: steps.pr.outputs.has_changes == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber = '${{ steps.vars.outputs.issue_number }}'
            const suite = '${{ steps.vars.outputs.suite }}'
            const branch = '${{ steps.pr.outputs.branch }}'
            const target = '${{ steps.promote.outputs.target }}'
            const base = 'main'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const head = `${owner}:${branch}`
            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', head })
            if (prs.length > 0) {
              core.info(`PR ya existe: ${prs[0].html_url}`)
              return
            }
            const title = `test(agent): promote issue #${issueNumber} to eval`
            const body = `Promoción automática de la issue #${issueNumber} a suite \`${suite}\`.\n\nArchivo: \`${target}\``
            const { data: pr } = await github.rest.pulls.create({ owner, repo, title, head, base, body })
            core.info(`PR creada: ${pr.html_url}`)

      - name: Comment Back
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const suite = '${{ steps.vars.outputs.suite }}';
            const target = '${{ steps.promote.outputs.target }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Promoción ejecutada. Suite: \`${suite}\` Archivo: \`${target}\`\n\n🔗 Run: ${runUrl}`
            });

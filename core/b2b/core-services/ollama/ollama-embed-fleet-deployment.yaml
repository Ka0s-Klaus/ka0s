apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-embed-fleet
  namespace: ollama
  labels:
    app: ollama-embed-fleet
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ollama-embed-fleet
  template:
    metadata:
      labels:
        app: ollama-embed-fleet
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8-manager
      initContainers:
      - name: pull-model
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Starting Ollama server in background..."
          ollama serve &
          pid=$!
          echo "Waiting for server to be ready..."
          until ollama list >/dev/null 2>&1; do sleep 1; done
          echo "Pulling nomic-embed-text..."
          ollama pull nomic-embed-text
          echo "Stopping Ollama server..."
          kill $pid
          wait $pid 2>/dev/null || true
          echo "Model pulled successfully."
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        env:
        - name: OLLAMA_NUM_PARALLEL
          value: "2"
        - name: OLLAMA_HOST
          value: "0.0.0.0"
        - name: OLLAMA_ORIGINS
          value: "*"
        resources:
          requests:
            memory: "300Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      volumes:
      - name: models
        emptyDir: {}

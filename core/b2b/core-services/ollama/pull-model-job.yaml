apiVersion: batch/v1
kind: Job
metadata:
  name: pull-llama3-2-7b
  namespace: ollama
spec:
  template:
    spec:
      nodeSelector:
        ka0s.io/ollama-node: "true"
      containers:
      - name: pull-model
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for Ollama API..."
          while ! curl -s http://ollama:11434/api/tags > /dev/null; do
            sleep 2
          done
          echo "Pulling nomic-embed-text..."
          curl -X POST http://ollama:11434/api/pull -d '{"name": "nomic-embed-text"}'
          echo "Pulling llama3.2:7b..."
          curl -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2:7b"}'
      restartPolicy: OnFailure

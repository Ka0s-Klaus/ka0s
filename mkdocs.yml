site_name: Ka0s Documentation
site_url: https://docs.ka0s.io
repo_url: https://github.com/Ka0s-Klaus/ka0s
repo_name: Ka0s-Klaus/ka0s
edit_uri: blob/main/core/docs/

theme:
  name: material
  language: es
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - attr_list
  - md_in_html

# Configuration for documentation source
docs_dir: core/docs
site_dir: site

nav:
  - Home: README.md
  - Arquitectura y Conceptos:
      - 'Ka0s Core': ka0s/ka0s.md
      - 'Arquitectura': ka0s_architecture/architecture.md
      - 'Template': ka0s_template/ka0s_template.md
      - 'Landing Zone': ka0s_lz/ka0s_lz.md
  - 'CI/CD y Automatización':
      - 'Pipeline K8s': ka0s_ci_cd_k8s/ka0s_ci_cd_k8s.md
      - 'SSH Connect': ka0s_ssh_connect/ka0s_ssh_connect.md
      - 'Kubectl Tunnel': ka0s_kubectl_tunnel/ka0s_kubectl_tunnel.md
      - 'Versionado': ka0s_version/ka0s_version.md
      - 'Ejecución': ka0s_execution/ka0s_execution.md
      - 'Release': ka0s_release/ka0s_release.md
  - 'Observabilidad y Reportes':
      - 'Dashboard': ka0s_dashboard/ka0s_dashboard.md
      - 'Reporte Diario': ka0s_daily_report/ka0s_daily_report.md
      - 'Inspector': ka0s_inspector/ka0s_inspector.md
      - 'Resumen': ka0s_summary/ka0s_summary.md
      - 'iTop': ka0s_itop/ka0s_itop.md
      - 'Lead Time': ka0s_reports/lead_time_report.md
      - 'Metabase': ka0s_metabase/ka0s_metabase.md
  - 'Seguridad y Compliance':
      - 'Seguridad General': ka0s_security/ka0s_security.md
      - 'HTML Lint': ka0s_html/ka0s_html.md
      - 'JSON Lint': ka0s_json/ka0s_json.md
      - 'Markdown Lint': ka0s_md/ka0s_md.md
      - 'YAML Lint': ka0s_yaml/ka0s_yaml.md
  - 'Operaciones y Mantenimiento':
      - 'Actualización Cluster': ka0s_cluster_update/ka0s_cluster_update.md
      - 'Reinicio Cluster': kaos_cluster_restart/kaos_cluster_restart.md
      - 'Docker': ka0s_docker/ka0s_docker.md
      - 'MongoDB': ka0s_mongo/ka0s_mongo.md
      - 'Ingesta CMDB': ka0s_cmdb_ingest/ka0s_cmdb_ingest.md
      - 'Eliminar NS': ka0s_delete_ns/ka0s_delete_ns.md
      - 'Onboarding': ka0s_onboarding/ka0s_onboarding.md
      - 'Portal Docs': ka0s_docs_portal/ka0s_docs_portal.md

apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
    managed-by: ka0s-core-cd
spec:
  selector:
    app: openclaw
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 18789
    - name: bridge
      protocol: TCP
      port: 18791
      targetPort: 18791
  type: ClusterIP

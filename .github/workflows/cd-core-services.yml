name: "Ka0s CD Core Services Deploy -> K8s"
on:
  workflow_dispatch:
    inputs:
      force_service:
        description: 'Force deploy specific service (folder name in core/b2b/core-services/)'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'core/b2b/core-services/**'
      - '!core/b2b/core-services/kube/**'
      - 'core/docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read

env:
  KAOS_MODULE: "[Ka0s] CD Core Services"
  KAOS_CODE: ${{ github.run_id }}

jobs:
  deploy-services:
    name: Deploy Changed Services
    runs-on: swarm-runners-scaleset
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      services: ${{ steps.deploy_step.outputs.services }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kubectl Tunnel
        uses: ./.github/actions/kubectl-tunnel
        with:
          host: ${{ secrets.KAOS_SSH_HOST_1 }}
          username: ${{ secrets.KAOS_SSH_USER }}
          key: ${{ secrets.KAOS_SSH_KEY_PRIV }}
          port: ${{ secrets.KAOS_SSH_PORT_1 }}

      - name: Detect and Deploy
        id: deploy_step
        run: |
          echo "Detecting changes..."
          
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          
          # Fallback for cases where before SHA is zero (e.g. new branch push, though rare on main)
          if [ -z "$BEFORE" ] || [ "$BEFORE" == "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          
          echo "Diffing range: $BEFORE...$AFTER"
          
          # Check for manual override via workflow_dispatch input
          MANUAL_SERVICE="${{ github.event.inputs.force_service }}"
          
          if [ ! -z "$MANUAL_SERVICE" ]; then
            echo "🔧 Manual override detected for service: $MANUAL_SERVICE"
            # Validate directory exists
            TARGET_DIR="core/b2b/core-services/$MANUAL_SERVICE"
            if [ -d "$TARGET_DIR" ]; then
               CHANGED_SERVICES="$TARGET_DIR"
            else
               echo "❌ Error: Service directory $TARGET_DIR does not exist."
               exit 1
            fi
          else
            # Robust service detection logic
            echo "🔎 Analyzing changed files..."
            
            # Get list of changed files
            FILES=$(git diff --name-only "$BEFORE" "$AFTER")
            
            # Initialize empty list
            SERVICES_LIST=""
            
            # 1. Process core-services changes
            # Filter files in core/b2b/core-services/ but not in kube/
            CORE_FILES=$(echo "$FILES" | grep "^core/b2b/core-services/" | grep -v "^core/b2b/core-services/kube/" || true)
            
            if [ ! -z "$CORE_FILES" ]; then
              # Extract service paths: keep only up to the 4th component (core/b2b/core-services/<service>)
              # Using sed for reliable extraction
              EXTRACTED=$(echo "$CORE_FILES" | sed -E 's|^(core/b2b/core-services/[^/]+).*|\1|')
              SERVICES_LIST="$SERVICES_LIST $EXTRACTED"
            fi
            
            # 2. Check for docs changes
            DOCS_FILES=$(echo "$FILES" | grep -E "^core/docs/|^mkdocs.yml" || true)
            if [ ! -z "$DOCS_FILES" ]; then
               echo "📚 Docs changes detected. Adding docs-portal to deployment list."
               SERVICES_LIST="$SERVICES_LIST core/b2b/core-services/docs-portal"
            fi
            
            # 3. Clean up list (sort and unique)
            CHANGED_SERVICES=$(echo "$SERVICES_LIST" | tr ' ' '\n' | sort | uniq | grep -v "^$" || true)
          fi
          
          # Convert to comma-separated for output
          SERVICES_CSV=$(echo "$CHANGED_SERVICES" | tr '\n' ',' | sed 's/,$//')
          echo "services=$SERVICES_CSV" >> $GITHUB_OUTPUT
          
          if [ -z "$CHANGED_SERVICES" ]; then
            echo "No relevant services changed in this push."
            exit 0
          fi
          
          echo "Found modified services: $CHANGED_SERVICES"
          
          for SERVICE in $CHANGED_SERVICES; do
            # Check if directory still exists (it might have been deleted)
            if [ ! -d "$SERVICE" ]; then
               echo "🧹 Service directory $SERVICE was deleted. Running cleanup..."
               SERVICE_NAME=$(basename "$SERVICE")
               NAMESPACE="$SERVICE_NAME"
               echo "Cleanup with managed selector"
               kubectl delete ingress,service,deploy,sts,job,cronjob -n "$NAMESPACE" -l "managed-by=ka0s-core-cd,app=$SERVICE_NAME" --ignore-not-found
               kubectl delete configmap,secret -n "$NAMESPACE" -l "managed-by=ka0s-core-cd,app=$SERVICE_NAME" --ignore-not-found
               echo "Fallback cleanup with app selector"
               kubectl delete ingress,service,deploy,sts,job,cronjob -n "$NAMESPACE" -l "app=$SERVICE_NAME" --ignore-not-found
               kubectl delete configmap,secret -n "$NAMESPACE" -l "app=$SERVICE_NAME" --ignore-not-found
               if [ "${KAOS_ENABLE_NS_CLEANUP}" = "true" ] && [ "$NAMESPACE" = "$SERVICE_NAME" ]; then
                 echo "Evaluating namespace cleanup"
                 RES=$(kubectl get all -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l | tr -d ' ')
                 PVC=$(kubectl get pvc -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l | tr -d ' ')
                 CM=$(kubectl get cm -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l | tr -d ' ')
                 SEC=$(kubectl get secret -n "$NAMESPACE" --no-headers 2>/dev/null | grep -v 'default-token' | wc -l | tr -d ' ')
                 if [ "${RES:-0}" -eq 0 ] && [ "${PVC:-0}" -eq 0 ] && [ "${CM:-0}" -eq 0 ] && [ "${SEC:-0}" -eq 0 ]; then
                   echo "Deleting empty namespace $NAMESPACE"
                   kubectl delete ns "$NAMESPACE" --ignore-not-found
                 else
                   echo "Namespace not empty, skipping deletion"
                 fi
               fi
               continue
            fi

            # Check for kustomization.yaml
            if [ -f "$SERVICE/kustomization.yaml" ]; then
              echo "---------------------------------------------------"
              echo "🚀 Deploying Service: $SERVICE"
              echo "---------------------------------------------------"
              
              # Detect Namespace Logic
              SERVICE_NAME=$(basename $SERVICE)
              NAMESPACE=$SERVICE_NAME # Default fallback

              # 1. Check kustomization.yaml for global namespace override
              KUST_NS=$(grep "^namespace:" "$SERVICE/kustomization.yaml" | awk '{print $2}')
              if [ ! -z "$KUST_NS" ]; then
                NAMESPACE=$KUST_NS
              else
                # 2. Look for explicit Namespace resource files
                # Find files that contain "kind: Namespace" within the service directory
                NS_FILE=$(grep -l "kind: Namespace" "$SERVICE/"*.yaml | head -n 1)
                if [ ! -z "$NS_FILE" ]; then
                  # Extract name from metadata.name
                  DETECTED_NS=$(grep -A 5 "metadata:" "$NS_FILE" | grep "name:" | awk '{print $2}' | head -n 1)
                  if [ ! -z "$DETECTED_NS" ]; then
                     NAMESPACE=$DETECTED_NS
                  fi
                fi
              fi
              echo "🎯 Target Namespace: $NAMESPACE"

              # Crear namespace si no existe (idempotente)
              kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
              
              # Special handling for docs-portal: Inject git credentials
              if [ "$SERVICE_NAME" == "docs-portal" ]; then
                 echo "🔑 Injecting git credentials for docs-portal..."
                 kubectl create secret generic git-credentials \
                    --from-literal=username="x-access-token" \
                    --from-literal=password="$GITHUB_TOKEN" \
                    --dry-run=client -o yaml | kubectl apply -n "$NAMESPACE" -f -
                 kubectl label secret git-credentials -n "$NAMESPACE" app="$SERVICE_NAME" managed-by="ka0s-core-cd" --overwrite
              fi

              # Special handling for runners: Inject GitHub App credentials
              if [ "$SERVICE_NAME" == "runners" ]; then
                 echo "🔑 Injecting GitHub App credentials for runners..."
                 kubectl create secret generic controller-manager \
                    --from-literal=github_app_id="1972621" \
                    --from-literal=github_app_installation_id="103064135" \
                    --from-literal=github_app_private_key="${{ secrets.PRIVATE_KEY_PEM }}" \
                    --dry-run=client -o yaml | kubectl apply -n "$NAMESPACE" -f -
              fi
              
              # Delete old validation jobs to force re-run
              kubectl delete job -n "$NAMESPACE" -l "app=$SERVICE_NAME" --ignore-not-found
              
              # Aplicar manifiestos con Kustomize (Server-Side Apply)
              # Necesario para recursos grandes como CRDs (evita el límite de tamaño de last-applied-configuration)
              echo "   Applying manifests..."
              kubectl apply --server-side -k "$SERVICE/"
              
              # Special handling for docs-portal: Force restart to pull new content
              if [ "$SERVICE_NAME" == "docs-portal" ]; then
                 echo "🔄 Restarting docs-portal deployment to pull latest content..."
                 kubectl rollout restart deployment/docs-portal -n "$NAMESPACE"
              fi
              
              echo "⏳ Waiting for rollout..."
              # Intentar esperar rollout de deployments si existen en el kustomization
              kubectl rollout status deployment -n "$NAMESPACE" --timeout=60s || echo "⚠️ Rollout wait warning (maybe no deployment or timeout)"
              
              # Si hay un Job de validación (como nfs-validation-job), esperamos a que termine
              if kubectl get job -n "$NAMESPACE" | grep -q "validation"; then
                 echo "⏳ Validation Job detected. Waiting for completion..."
                 
                 # Extract job name containing "validation"
                 VALIDATION_JOB_NAME=$(kubectl get job -n "$NAMESPACE" --no-headers | awk '{print $1}' | grep "validation" | head -n 1)
                 
                 if [ ! -z "$VALIDATION_JOB_NAME" ]; then
                    echo "   Running wait for job/$VALIDATION_JOB_NAME"
                    kubectl wait --for=condition=complete "job/$VALIDATION_JOB_NAME" -n "$NAMESPACE" --timeout=120s || echo "⚠️ Validation Job timed out or failed"
                 else
                    echo "⚠️ Could not determine validation job name despite detection."
                 fi
              fi

              echo "📊 Generating Post-Deploy Report for $SERVICE..."
              REPORT_FILE="deployment-report-$SERVICE_NAME-${{ github.run_id }}.txt"
              
              echo "Deployment Report: $SERVICE" > $REPORT_FILE
              echo "Date: $(date)" >> $REPORT_FILE
              echo "Trigger: ${{ github.event_name }} by ${{ github.actor }}" >> $REPORT_FILE
              echo "Namespace: $NAMESPACE" >> $REPORT_FILE
              echo "---------------------------------------------------" >> $REPORT_FILE
              echo ">>> Pods Status:" >> $REPORT_FILE
              kubectl get pods -n "$NAMESPACE" -o wide >> $REPORT_FILE 2>&1 || echo "No pods found or namespace error" >> $REPORT_FILE
              echo "" >> $REPORT_FILE
              echo ">>> Services Status:" >> $REPORT_FILE
              kubectl get svc -n "$NAMESPACE" >> $REPORT_FILE 2>&1 || echo "No services found" >> $REPORT_FILE
              echo "" >> $REPORT_FILE
              echo ">>> Ingress Status:" >> $REPORT_FILE
              kubectl get ingress -n "$NAMESPACE" >> $REPORT_FILE 2>&1 || echo "No ingress found" >> $REPORT_FILE
              
              echo "---------------------------------------------------"
              cat $REPORT_FILE
              echo "---------------------------------------------------"

              echo "🔍 Running Advanced Verification..."
              
              # Auto-detect expected IP for LoadBalancer services
              EXPECTED_IP=""
              SERVICE_TYPE=$(kubectl get svc -n "$NAMESPACE" "$SERVICE_NAME" -o jsonpath='{.spec.type}' 2>/dev/null || echo "Unknown")
              
              if [ "$SERVICE_TYPE" == "LoadBalancer" ]; then
                echo "ℹ️ Service $SERVICE_NAME is LoadBalancer. Detecting assigned IP..."
                # Wait briefly for IP assignment if needed (though rollout status above should have covered pod readiness)
                EXPECTED_IP=$(kubectl get svc -n "$NAMESPACE" "$SERVICE_NAME" -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
                
                if [ -z "$EXPECTED_IP" ]; then
                   echo "⚠️ LoadBalancer IP not yet assigned. Verification might fail on IP check."
                else
                   echo "🎯 Detected LoadBalancer IP: $EXPECTED_IP"
                fi
              fi
              
              # Ensure script is executable
              chmod +x .github/scripts/k8s-verify-deployment.sh
              
              # Run verification and append to report
              echo "---------------------------------------------------" >> $REPORT_FILE
              echo ">>> Advanced Verification Results:" >> $REPORT_FILE
              
              JSON_REPORT_FILE="deployment-report-$SERVICE_NAME-${{ github.run_id }}.json"
              ./.github/scripts/k8s-verify-deployment.sh "$NAMESPACE" "$SERVICE_NAME" "$EXPECTED_IP" "$JSON_REPORT_FILE" 2>&1 | tee -a $REPORT_FILE
              
              # Save reports to audit/deploy
              mkdir -p audit/deploy
              FINAL_REPORT_PATH="audit/deploy/deployment-report-$SERVICE_NAME-${{ github.run_id }}.md"
              FINAL_JSON_PATH="audit/deploy/deployment-report-$SERVICE_NAME-${{ github.run_id }}.json"
              
              mv $REPORT_FILE $FINAL_REPORT_PATH
              [ -f "$JSON_REPORT_FILE" ] && mv "$JSON_REPORT_FILE" "$FINAL_JSON_PATH"
              
              echo "REPORT_PATH=$FINAL_REPORT_PATH" >> $GITHUB_ENV
              echo "LAST_SERVICE=$SERVICE_NAME" >> $GITHUB_ENV
              echo "LAST_NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
              
            else
              echo "⚠️  Skipping $SERVICE: No kustomization.yaml found."
            fi
          done

      - name: Commit Deployment Reports
        if: always()
        run: |
          git config --global user.name "Ka0s CI Bot"
          git config --global user.email "ci@ka0s.io"
          git pull --rebase
          git add audit/deploy/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(cd): save deployment audit reports [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

  handle-success:
    runs-on: swarm-runners-scaleset
    needs: [deploy-services]
    if: ${{ success() }}
    steps: 
      - run: echo "CD-CORE-SERVICES & CMDB Sync Success in runid ${{ github.run_id }}."
          
  handle-failure:
    name: Handle Failure
    needs: [deploy-services]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - id: repo
        name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
  namespace: zabbix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zabbix-server
  template:
    metadata:
      labels:
        app: zabbix-server
    spec:
      serviceAccountName: zabbix-service-account
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8-node-40
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8-node-20
      containers:
        - name: zabbix-server
          image: zabbix/zabbix-server-pgsql@sha256:efa0418299cd4d5c2428758753caac80e0321859ad2cd7dba8f380d7868ac07d
          ports:
            - containerPort: 10051
          env:
            - name: DB_SERVER_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: POSTGRES_USER
              value: "zabbix"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db
                  key: postgres-password
            - name: POSTGRES_DB
              value: "zabbix"
            - name: ZBX_CACHESIZE
              value: "512M"
            - name: ZBX_HISTORYCACHESIZE
              value: "128M"
            - name: ZBX_TRENDCACHESIZE
              value: "128M"
            - name: ZBX_VALUECACHESIZE
              value: "256M"
            - name: ZBX_STARTVMWARECOLLECTORS
              value: "0"
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "3Gi"
          startupProbe:
            tcpSocket:
              port: 10051
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 10051
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 10051
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: zabbix-server-data
              mountPath: /var/lib/zabbix
            - name: external-scripts
              mountPath: /usr/lib/zabbix/externalscripts
      volumes:
        - name: zabbix-server-data
          persistentVolumeClaim:
            claimName: zabbix-server-nfs-pvc
        - name: external-scripts
          configMap:
            name: zabbix-external-scripts
            defaultMode: 0755

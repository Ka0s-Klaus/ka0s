name: Verify Runner Scaling
run-name: Scaling Test (${{ inputs.job_count }} jobs) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      job_count:
        description: 'Number of parallel jobs to spawn'
        required: true
        default: '5'
        type: choice
        options:
        - '5'
        - '10'
        - '20'
        - '30'

jobs:
  generate-matrix:
    runs-on: swarm-runners-scaleset-ka0s
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          COUNT=${{ inputs.job_count }}
          # Generar array JSON [1, 2, ..., N]
          JSON=$(seq 1 $COUNT | jq -R . | jq -s -c .)
          echo "matrix=$JSON" >> $GITHUB_OUTPUT
          echo "Generated matrix for $COUNT jobs: $JSON"

  load-test:
    needs: generate-matrix
    runs-on: swarm-runners-scaleset-ka0s
    strategy:
      matrix:
        job_id: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Simulate Workload ${{ matrix.job_id }}
        run: |
          echo "Starting load test job #${{ matrix.job_id }}"
          echo "Hostname: $(hostname)"
          echo "Sleeping for 60 seconds to simulate work..."
          sleep 60
          echo "Job #${{ matrix.job_id }} completed."

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-server-ingress-egress
  namespace: llama-server
  labels:
    app: llama-server
    managed-by: ka0s-core-cd
spec:
  podSelector:
    matchLabels:
      app: llama-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openclaw
          podSelector:
            matchLabels:
              app: openclaw
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

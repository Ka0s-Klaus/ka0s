          filter:
            evaltype: AND
            conditions:
              - macro: '{#NUTANIX.CLUSTER.NAME}'
                value: '{$NUTANIX.CLUSTER.DISCOVERY.NAME.MATCHES}'
              - macro: '{#NUTANIX.CLUSTER.NAME}'

name: Ka0s Audit Service
on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Nombre del Servicio a auditar'
        required: true
        type: string
      namespace:
        description: 'Namespace del servicio'
        required: false
        default: 'default'
        type: string

permissions:
  contents: read

env:
  KAOS_MODULE: "[Ka0s] Audit Service"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}

jobs:
  audit-service:
    name: Audit Service
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando auditoría de servicio: ${{ inputs.service_name }} en namespace ${{ inputs.namespace }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"

      - name: Setup Kubectl Tunnel
        uses: ./.github/actions/kubectl-tunnel
        with:
          host: ${{ secrets.KAOS_SSH_HOST_1 }}
          username: ${{ secrets.KAOS_SSH_USER }}
          key: ${{ secrets.KAOS_SSH_KEY_PRIV }}
          port: ${{ secrets.KAOS_SSH_PORT_1 }}

      - name: Execute Service Audit
        run: |
          chmod +x devops/core/k8s/audit-service.sh
          ./devops/core/k8s/audit-service.sh "${{ inputs.service_name }}" "${{ inputs.namespace }}" "${{ github.run_id }}" "audit/k8services"

      - name: Commit Audit Report
        if: success()
        run: |
          git config --global user.name "Ka0s Bot"
          git config --global user.email "bot@ka0s.io"
          
          git pull --rebase origin main || git pull origin main
          git add audit/k8services/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(audit): service audit ${{ inputs.service_name }} run ${{ env.KAOS_CODE }} [skip ci]"
            git push || (git pull --rebase origin main && git push)
          else
            echo "No changes to commit."
          fi

  handle-success:
    name: Handle Success
    needs: [audit-service]
    if: success()
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - name: Notify Success
        run: echo "✅ Auditoría de servicio completada correctamente."

  handle-failure:
    name: Handle Failure
    needs: [audit-service]
    if: failure()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

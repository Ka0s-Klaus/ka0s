apiVersion: apps/v1
kind: Deployment
metadata:
  name: anythingllm
  namespace: anythingllm
  labels:
    app: anythingllm
    managed-by: ka0s-core-cd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anythingllm
  template:
    metadata:
      labels:
        app: anythingllm
        managed-by: ka0s-core-cd
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8-manager
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-storage
          image: busybox:1.36
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -eu
              mkdir -p /data/storage /data/collector/hotdir /data/collector/outputs
              touch /data/storage/anythingllm.db
              chmod 0777 /data/storage /data/collector /data/collector/hotdir /data/collector/outputs
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: anythingllm
          image: mintplexlabs/anythingllm:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: STORAGE_DIR
              value: /app/server/storage
            - name: JWT_SECRET
              value: "ka0s-super-secret-jwt-token-2026"
            - name: AUTH_TOKEN
              value: "ka0s-super-secret-auth-token-2026"
            - name: LLM_PROVIDER
              value: ollama
            - name: OLLAMA_BASE_PATH
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: EMBEDDING_ENGINE
              value: ollama
            - name: EMBEDDING_BASE_PATH
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: EMBEDDING_MODEL_PREF
              value: nomic-embed-text:latest
            - name: VECTOR_DB
              value: pgvector
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: data
              mountPath: /app/server/storage
              subPath: storage
            - name: data
              mountPath: /app/collector/hotdir
              subPath: collector/hotdir
            - name: data
              mountPath: /app/collector/outputs
              subPath: collector/outputs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: anythingllm-pvc

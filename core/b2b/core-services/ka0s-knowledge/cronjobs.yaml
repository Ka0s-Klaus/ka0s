apiVersion: batch/v1
kind: CronJob
metadata:
  name: knowledge-producer-mongo
  namespace: ka0s-knowledge
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          priorityClassName: ka0s-offline-low
          restartPolicy: Never
          containers:
            - name: producer
              image: python:3.11-slim
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  pip install --no-cache-dir requests pymongo && python /scripts/produce_mongo.py
              env:
                - name: SOURCE
                  value: mongo
                - name: MODE
                  value: auto
                - name: SPOOL_DIR
                  value: /spool
                - name: OLLAMA_EMBED_URL
                  value: http://ollama-embed.ollama-embed.svc.cluster.local:11434
                - name: EMBEDDING_MODEL
                  value: nomic-embed-text
                - name: EMBEDDING_DIM
                  value: "768"
                - name: MONGO_DB
                  value: audit
                - name: MONGO_COLLECTIONS
                  value: "*"
                - name: MONGO_COLLECTIONS_EXCLUDE
                  value: ""
                - name: MONGO_ALLOW_FIELDS
                  value: ""
                - name: MONGO_DENY_FIELDS
                  value: "password,passwd,token,secret,api_key,apikey,authorization,auth,credential,credentials"
                - name: CHUNK_MAX_CHARS
                  value: "2000"
                - name: CHUNK_OVERLAP_CHARS
                  value: "200"
                - name: MAX_DOCS_PER_RUN
                  value: "0"
                - name: MAX_CHUNKS_PER_RUN
                  value: "0"
              envFrom:
                - secretRef:
                    name: knowledge-sources
              volumeMounts:
                - name: spool
                  mountPath: /spool
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: spool
              persistentVolumeClaim:
                claimName: knowledge-spool
            - name: scripts
              configMap:
                name: knowledge-pipeline-scripts

---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: knowledge-producer-postgresql
  namespace: ka0s-knowledge
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          priorityClassName: ka0s-offline-low
          restartPolicy: Never
          containers:
            - name: producer
              image: python:3.11-slim
              command: ["/bin/sh", "-lc"]
              args:
                - |
                  pip install --no-cache-dir requests psycopg2-binary && python /scripts/produce_postgresql.py
              env:
                - name: SOURCE
                  value: postgresql-monitoring
                - name: MODE
                  value: auto
                - name: SPOOL_DIR
                  value: /spool
                - name: OLLAMA_EMBED_URL
                  value: http://ollama-embed.ollama-embed.svc.cluster.local:11434
                - name: EMBEDDING_MODEL
                  value: nomic-embed-text
                - name: EMBEDDING_DIM
                  value: "768"
                - name: PG_SCHEMA
                  value: public
                - name: PG_TABLES
                  value: "*"
                - name: PG_TABLES_EXCLUDE
                  value: ""
                - name: PG_WATERMARK_FIELD
                  value: updated_at
                - name: PG_ALLOW_FIELDS
                  value: ""
                - name: PG_DENY_FIELDS
                  value: "password,passwd,token,secret,api_key,apikey,authorization,auth,credential,credentials"
                - name: PG_FETCH_SIZE
                  value: "1000"
                - name: CHUNK_MAX_CHARS
                  value: "2000"
                - name: CHUNK_OVERLAP_CHARS
                  value: "200"
                - name: MAX_ROWS_PER_TABLE
                  value: "0"
                - name: MAX_ROWS_PER_RUN
                  value: "0"
                - name: MAX_CHUNKS_PER_RUN
                  value: "0"
              envFrom:
                - secretRef:
                    name: knowledge-sources
              volumeMounts:
                - name: spool
                  mountPath: /spool
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: spool
              persistentVolumeClaim:
                claimName: knowledge-spool
            - name: scripts
              configMap:
                name: knowledge-pipeline-scripts


name: "[Ka0s] CMDB Ingestion"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Ingesta manual de CMDB'
      dry_run:
        description: 'Dry Run (no changes)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'devops/core/cmdb/**'

permissions:
  contents: write
  issues: write
  actions: read

env:
  KAOS_MODULE: "[Ka0S] CMDB Ingest"
  KAOS_CORRELATION_ID: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION
  # Lógica principal del workflow.
  # -----------------------------------------------------------------------------
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CORRELATION_ID }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # [BLOQUE PERSONALIZABLE] Lógica del workflow
      - name: Main Logic
        env:
          ITOP_URL: ${{ secrets.ITOP_URL || vars.ITOP_URL }}
          ITOP_USER: ${{ secrets.ITOP_API_USER }}
          ITOP_PASSWORD: ${{ secrets.ITOP_API_PASSWORD }}
          # Desactivar verificación SSL para entorno interno (self-signed)
          ITOP_SSL_VERIFY: 'false'
        run: |
          echo "Ejecutando lógica principal de ingesta CMDB..."
          
          ARGS=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="--dry-run"
          fi
          
          python core/scripts/cmdb_ingest.py --dir devops/core/cmdb $ARGS

      # [OPCIONAL] Commit de resultados/evidencias
      # En este caso no generamos artefactos en git, pero mantenemos el bloque
      # por si en el futuro queremos guardar logs de auditoría.
      - name: Commit & Push Results
        if: success()
        run: |
          echo "No hay artefactos que commitear en este flujo."

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS (Opcional)
  # Notificaciones o limpieza en caso de éxito.
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE (Obligatorio)
  # Notificaciones en caso de error del workflow.
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW (Opcional/Estándar)
  # Acciones finales: Notificaciones a Issues, Trigger de Inspector, Limpieza global.
  # Basado en el estándar de .github/workflows/kaos.yml
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    steps:
      - id: repo
        name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          # Nota: Verificamos si existe inspector.yml antes de intentar ejecutarlo
          if gh workflow list | grep -q "inspector.yml"; then
            gh workflow run inspector.yml \
              --ref main \
              -f kaos-workflow-id="${{ github.run_id }}" \
              -f kaos-user-start="${{ github.triggering_actor }}"
          else
             echo "Inspector workflow not found, skipping."
          fi

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-ia
  namespace: postgresql-ia
  labels:
    app: postgresql-ia
spec:
  serviceName: "postgresql-ia"
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-ia
  template:
    metadata:
      labels:
        app: postgresql-ia
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgresql
        image: ankane/pgvector:v0.5.1 # PG15 with vector support
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_DB
        - name: POSTGRES_HOST_AUTH_METHOD
          value: "trust"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        command: ["docker-entrypoint.sh"]
        args: ["postgres", "-c", "listen_addresses=*", "-c", "hba_file=/var/lib/postgresql/data/pgdata/pg_hba.conf"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ka0s_ai
            - -d
            - ka0s_memory
          initialDelaySeconds: 120 # Increased to allow initdb to complete
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - ka0s_ai
            - -d
            - ka0s_memory
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: postgres-ia-data
          mountPath: /var/lib/postgresql/data
      - name: zabbix-agent
        image: zabbix/zabbix-agent2:ubuntu-7.0-latest
        ports:
        - containerPort: 10050
          name: zabbix-agent
        env:
        - name: ZBX_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ZBX_SERVER_HOST
          value: "zabbix-server.zabbix.svc.cluster.local,172.16.64.148"
        - name: ZBX_METADATA
          value: "postgresql"
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_URI
          value: "tcp://localhost:5432"
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_USER
        - name: ZBX_PLUGINS_POSTGRESQL_SESSIONS_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-ia-secret
              key: POSTGRES_PASSWORD
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      nodeSelector:
        kubernetes.io/hostname: k8-node-20
  volumeClaimTemplates:
  - metadata:
      name: postgres-ia-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 10Gi

name: "Ka0s Template Workflow" # Estandarizar nombre: [Ka0s] <Nombre Descriptivo>

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Mantenimiento manual'
  push:
    branches:
      - main
    paths:
      - 'core/**' # Ajustar al alcance del workflow

permissions:
  contents: read

env:
  KAOS_MODULE: "[Ka0S] Template" # Nombre del módulo para logs
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION
  # Lógica principal del workflow.
  # -----------------------------------------------------------------------------
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset-ka0s # Estándar de runners en Ka0s
    permissions:
      contents: write
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para git diff y análisis de historia

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      # [BLOQUE PERSONALIZABLE] Lógica del workflow
      - name: Main Logic
        run: |
          echo "Ejecutando lógica principal..."
          # ./ruta/a/script.sh

      # [OPCIONAL] Commit de resultados/evidencias
      - name: Commit & Push Results
        if: success() # Solo si la lógica anterior tuvo éxito
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          
          # Ajustar ruta de archivos a commitear
          # git add audit/outputs/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(ka0s): update artifacts ${{ env.KAOS_MODULE }} run ${{ env.KAOS_CODE }} [skip ci]"
            # Reintento básico de push para evitar conflictos de concurrencia
            count=0
            until git push origin HEAD:${{ github.ref_name }} || [ $count -eq 5 ]; do
              echo "Push fallido, reintentando..."
              git pull --rebase origin ${{ github.ref_name }}
              ((count++))
              sleep 2
            done
          else
            echo "No hay cambios para subir."
          fi

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS (Opcional)
  # Notificaciones o limpieza en caso de éxito.
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE (Obligatorio)
  # Notificaciones en caso de error del workflow.
  # IMPORTANTE: No debe depender de 'handle-success' para evitar ser saltado si el éxito no ocurre.
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW (Opcional/Estándar)
  # Acciones finales: Notificaciones a Issues, Trigger de Inspector, Limpieza global.
  # Basado en el estándar de .github/workflows/kaos.yml
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      actions: write
      contents: read
    steps:
      - id: repo
        name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          # Estandarización de inputs para inspector.yml
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

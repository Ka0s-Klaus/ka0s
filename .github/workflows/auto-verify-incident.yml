name: "Auto Verify Incident"

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      scan_all:
        description: 'Escanear todas las issues abiertas con label itop-incident'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 * * * *' # Ejecutar cada hora

permissions:
  contents: read
  issues: write # Necesario para cerrar/comentar issues
  actions: write # Necesario para end-workflow

env:
  KAOS_MODULE: "[Ka0S] Incident Verification"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION
  # Lógica principal de verificación y remediación.
  # -----------------------------------------------------------------------------
  core-execution:
    name: Core Execution
    # Ejecutar si es issue event con label itop-incident OR si es dispatch/schedule
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'itop-incident')) ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule')
    runs-on: swarm-runners-scaleset
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GH CLI (Safety Check)
        run: |
          if ! command -v gh &> /dev/null; then
             echo "gh cli not found, installing..."
             # Asumimos que en este entorno si falla no podemos instalarlo fácilmente sin sudo/root
             # pero reportamos estado.
             echo "::warning::GH CLI not found in runner."
          else
             echo "gh cli found: $(gh --version)"
          fi

      - name: Main Logic - Verify Incident(s)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Modo Batch: Escaneando todas las issues..."
            # scan_all input solo existe en dispatch, para schedule asumimos true implícito (o ajustamos script)
            # El script verify-incident.py usa flag --scan-all sin argumentos.
            python3 .github/scripts/verify-incident.py --scan-all
          else
            echo "Modo Single: Verificando Issue #${{ github.event.issue.number }}..."
            python3 .github/scripts/verify-incident.py \
              --issue-body "$ISSUE_BODY" \
              --issue-number "$ISSUE_NUMBER"
          fi

      - name: Commit & Push Results (Optional)
        if: success()
        run: echo "No artifacts to commit for verification process."

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE
  # IMPORTANTE: Evitamos label 'itop-incident' para no crear bucle infinito
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "triage,automated,workflow-failure" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow de verificación **${{ github.workflow }}** ha fallado (error de ejecución interna).
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - id: repo
        name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ needs.core-execution.outputs.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

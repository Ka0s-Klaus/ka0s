name: "Ka0s Agent Nightly Ingest"

on:
  schedule:
    - cron: '0 3 * * *' # Ejecutar a las 3:00 AM UTC todas las noches
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Actualización manual de memoria'

permissions:
  contents: write # Necesario para pushear el reporte
  issues: write   # Necesario para reportar incidentes
  actions: write  # Necesario para end-workflow

env:
  KAOS_MODULE: "[Ka0S] Agent Ingest"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}
  # Configuración para el script de ingesta (dentro del cluster)
  POSTGRES_HOST: postgresql-ia.postgresql-ia.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ka0s_memory"
  POSTGRES_USER: "ka0s_ai"
  OLLAMA_HOST: ollama.ollama.svc.cluster.local
  OLLAMA_PORT: "11434"

jobs:
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests

      - name: Generate Report Name
        id: setup
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          REPORT_NAME="${TIMESTAMP}_${{ github.run_id }}_ka0s-agent-ingest.md"
          echo "REPORT_NAME=${REPORT_NAME}" >> $GITHUB_ENV
          echo "Generando reporte: audit/ingest/${REPORT_NAME}"

      - name: Run Ingestion Script
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_IA_PASSWORD }}
        run: |
          mkdir -p audit/ingest
          echo "# Reporte de Ingesta Diaria - Agente Ka0s" > "audit/ingest/${{ env.REPORT_NAME }}"
          echo "" >> "audit/ingest/${{ env.REPORT_NAME }}"
          echo "**Fecha:** $(date)" >> "audit/ingest/${{ env.REPORT_NAME }}"
          echo "**Workflow ID:** ${{ github.run_id }}" >> "audit/ingest/${{ env.REPORT_NAME }}"
          echo "**Actor:** ${{ github.actor }}" >> "audit/ingest/${{ env.REPORT_NAME }}"
          echo "" >> "audit/ingest/${{ env.REPORT_NAME }}"
          echo "## Log de Ejecución" >> "audit/ingest/${{ env.REPORT_NAME }}"
          echo '```' >> "audit/ingest/${{ env.REPORT_NAME }}"
          
          # Ejecutar el script y capturar salida tanto en consola como en el reporte
          python core/ai/memory/ingest_local.py 2>&1 | tee -a "audit/ingest/${{ env.REPORT_NAME }}"
          
          echo '```' >> "audit/ingest/${{ env.REPORT_NAME }}"
          
          # Verificar estado de salida
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "## Estado: ✅ Éxito" >> "audit/ingest/${{ env.REPORT_NAME }}"
          else
            echo "## Estado: ❌ Fallo" >> "audit/ingest/${{ env.REPORT_NAME }}"
            exit 1
          fi

      - name: Commit & Push Results
        if: always()
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          
          git add audit/ingest/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(audit): add ingestion report ${{ env.REPORT_NAME }} [skip ci]"
            
            # Reintento robusto para evitar condiciones de carrera
            count=0
            MAX_RETRIES=5
            until [ $count -ge $MAX_RETRIES ]; do
              if git push origin HEAD:${{ github.ref_name }}; then
                echo "✅ Push exitoso"
                exit 0
              fi
              echo "⚠️ Push fallido. Reintentando pull --rebase..."
              git pull --rebase origin ${{ github.ref_name }}
              ((count++))
              sleep 5
            done
            exit 1
          else
            echo "No hay reporte generado para subir."
          fi

  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          # Estandarización de inputs para inspector.yml
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ needs.core-execution.outputs.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

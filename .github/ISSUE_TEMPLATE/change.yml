name: 🔄 Cambio (Change)
description: Solicita un cambio controlado y sincronízalo con iTop.
title: "[CHANGE]: "
labels: ["itop-change", "change"]
projects: ["Ka0s-Klaus/4"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
          <img src="https://raw.githubusercontent.com/Ka0s-Klaus/ka0s/main/core/imgs/logo-ka0s.png" width="300" />
        </div>

        Completa los detalles del cambio propuesto. Será mapeado a un Change en iTop.

  - type: dropdown
    id: organization
    attributes:
      label: Organizacion
      options:
        - Ka0s Inc
        - Test 1
        - Test 2
    validations:
      required: true

  - type: input
    id: requester
    attributes:
      label: Solicitante (Caller)
      placeholder: "@ka0sc0re"

  - type: dropdown
    id: change_type
    attributes:
      label: Tipo de cambio
      options:
        - Routine
        - Normal
        - Emergency

  - type: dropdown
    id: outage
    attributes:
      label: Outage (¿implica indisponibilidad del servicio?)
      options:
        - "yes"
        - "no"
    validations:
      required: true

  - type: input
    id: service
    attributes:
      label: Servicio / CI objetivo
      placeholder: Ej. web-frontend
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Descripción del Cambio
      description: Alcance, ventanas, riesgos.
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Evaluación de Riesgo
      description: Probabilidad e impacto; mitigaciones.

  - type: textarea
    id: backout
    attributes:
      label: Plan de Retroceso
      description: Pasos para revertir en caso de fallo.

name: "[Ka0s] Zabbix Service Auto-Discovery"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Mantenimiento manual'
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes
  push:
    branches:
      - main
    paths:
      - 'core/monitoring/zabbix/**'

permissions:
  contents: read

env:
  KAOS_MODULE: "[Ka0S] Zabbix Auto-Discovery"
  KAOS_CODE: ${{ github.run_id }}
  KAOS_ACTOR: ${{ github.actor }}

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: CORE EXECUTION
  # Lógica principal del workflow.
  # -----------------------------------------------------------------------------
  core-execution:
    name: Core Execution
    runs-on: swarm-runners-scaleset
    permissions:
      contents: write
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          echo "Iniciando módulo: ${{ env.KAOS_MODULE }}"
          echo "Run ID: ${{ env.KAOS_CODE }}"
          echo "Actor: ${{ env.KAOS_ACTOR }}"

      # [BLOQUE PERSONALIZABLE] Lógica del workflow
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests kubernetes

      - name: Setup Kubectl Tunnel
        uses: ./.github/actions/kubectl-tunnel
        with:
          host: ${{ secrets.KAOS_SSH_HOST_1 }}
          username: ${{ secrets.KAOS_SSH_USER }}
          key: ${{ secrets.KAOS_SSH_KEY_PRIV }}
          port: ${{ secrets.KAOS_SSH_PORT_1 }}
          k8s-api-port: '6443'
          kubectl-version: 'v1.30.0'

      - name: Sync Dashboards to Zabbix
        env:
          ZABBIX_URL: ${{ secrets.ZABBIX_URL }}
          ZABBIX_USER: ${{ secrets.ZABBIX_USER }}
          ZABBIX_PASS: ${{ secrets.ZABBIX_PASS }}
        run: |
          echo "Ejecutando lógica principal de descubrimiento..."
          
          # Verificar si ZABBIX_URL está definido
          if [ -z "$ZABBIX_URL" ]; then
            echo "::warning::ZABBIX_URL secret is missing or empty. Using fallback internal URL."
            export ZABBIX_URL="http://zabbix-web.zabbix.svc.cluster.local/api_jsonrpc.php"
          fi
          
          # Probar conectividad al API
          echo "Probando conexión a Zabbix en $ZABBIX_URL..."
          curl -s -X POST -H "Content-Type: application/json" -d '{"jsonrpc": "2.0", "method": "apiinfo.version", "params": [], "id": 1}' $ZABBIX_URL || echo "::warning::Fallo en CURL a Zabbix"
          
          # Export KUBECONFIG to point to the tunneled cluster configuration
          export KUBECONFIG=~/.kube/config
          
          # Usar python requests directamente en lugar del script para debuggear
          python3 -c "
          import os
          import requests
          import sys
          import json
          
          original_url = os.environ.get('ZABBIX_URL')
          user = os.environ.get('ZABBIX_USER')
          password = os.environ.get('ZABBIX_PASS')
          
          # Intentar con la URL original y si falla, probar con alternativas
          urls_to_test = [
              original_url,
              original_url.replace('api_jsonrpc.php', 'zabbix/api_jsonrpc.php') if 'api_jsonrpc.php' in original_url else f'{original_url.rstrip(\"/\")}/zabbix/api_jsonrpc.php',
              f'{original_url.replace(\"api_jsonrpc.php\", \"\").rstrip(\"/\")}/api_jsonrpc.php'
          ]
          
          # Quitar duplicados manteniendo orden
          urls_to_test = list(dict.fromkeys(urls_to_test))
          
          success = False
          
          for url in urls_to_test:
              print(f'\\n--- Testing URL: {url} ---')
              
              headers = {
                  'Content-Type': 'application/json',
                  'Accept': 'application/json'
              }
              data = {
                  'jsonrpc': '2.0',
                  'method': 'user.login',
                  'params': {
                      'user': user,
                      'password': password
                  },
                  'id': 1
              }
              
              try:
                  response = requests.post(url, json=data, headers=headers, allow_redirects=False, timeout=10)
                  print(f'Status Code: {response.status_code}')
                  
                  if response.status_code in (301, 302, 307, 308):
                      print(f'Redirected to: {response.headers.get(\"Location\")}')
                      continue
                      
                  # Si es HTML, ignorar y probar siguiente
                  if 'text/html' in response.headers.get('Content-Type', ''):
                      print('Received HTML response instead of JSON. This is likely the wrong endpoint path.')
                      continue
                      
                  result = response.json()
                  
                  if 'error' in result:
                      err = result['error']
                      print(f'API Error: {err}')
                      # Si hay error de API (ej. credenciales inválidas) pero responde JSON, 
                      # entonces el endpoint es correcto pero las credenciales no.
                      # Guardamos el endpoint correcto
                      os.environ['ZABBIX_URL'] = url
                      sys.exit(1)
                      
                  print('Authentication successful! Found correct endpoint.')
                  # Exportar para el script siguiente
                  with open(os.environ['GITHUB_ENV'], 'a') as f:
                      f.write(f'ZABBIX_URL={url}\\n')
                  success = True
                  break
                  
              except Exception as e:
                  print(f'Exception testing {url}: {e}')
                  continue
                  
          if not success:
              print('\\nFailed to connect to Zabbix API with any of the tested URLs.')
              sys.exit(1)
          "
          
          python3 core/monitoring/zabbix/scripts/monitor_k8s_services.py

      # [OPCIONAL] Commit de resultados/evidencias
      - name: Commit & Push Results
        if: success()
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          
          # En este caso no esperamos cambios en el repo, pero mantenemos la lógica por si acaso
          if ! git diff --staged --quiet; then
            git commit -m "chore(ka0s): update artifacts ${{ env.KAOS_MODULE }} run ${{ env.KAOS_CODE }} [skip ci]"
            # Reintento básico de push
            count=0
            until git push origin HEAD:${{ github.ref_name }} || [ $count -eq 5 ]; do
              echo "Push fallido, reintentando..."
              git pull --rebase origin ${{ github.ref_name }}
              ((count++))
              sleep 2
            done
          else
            echo "No hay cambios para subir."
          fi

  # -----------------------------------------------------------------------------
  # JOB 2: HANDLE SUCCESS (Opcional)
  # Notificaciones o limpieza en caso de éxito.
  # -----------------------------------------------------------------------------
  handle-success:
    name: Handle Success
    needs: [core-execution]
    if: success()
    runs-on: swarm-runners-scaleset
    steps:
      - name: Notify Success
        run: echo "✅ Workflow ${{ env.KAOS_MODULE }} completado correctamente."

  # -----------------------------------------------------------------------------
  # JOB 3: HANDLE FAILURE (Obligatorio)
  # Notificaciones en caso de error del workflow.
  # -----------------------------------------------------------------------------
  handle-failure:
    name: Handle Failure
    needs: [core-execution]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  # -----------------------------------------------------------------------------
  # JOB 4: END WORKFLOW (Opcional/Estándar)
  # Acciones finales: Notificaciones a Issues, Trigger de Inspector, Limpieza global.
  # -----------------------------------------------------------------------------
  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - id: repo
        name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
        
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Triggering Inspector for Audit..."
          # Estandarización de inputs para inspector.yml
          gh workflow run inspector.yml \
            --ref main \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}" \
            -f kaos-user-start="${{ github.triggering_actor }}"

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-pvc
  namespace: openclaw
  labels:
    app: openclaw
    managed-by: ka0s-core-cd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client # Se fuerza el uso de la clase de almacenamiento por defecto en Ka0s
  resources:
    requests:
      storage: 20Gi

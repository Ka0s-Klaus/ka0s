apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      initContainers:
        - name: init-zabbix-web-branding
          image: zabbix/zabbix-web-nginx-pgsql:latest
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /work
              cp -a /usr/share/zabbix/. /work/
              find /work -type f \( -iname 'zabbix_logo*.png' -o -iname 'zabbix-logo*.png' \) -exec cp /branding/zabbix_logo.png {} \;
              find /work -type f \( -iname 'zabbix_logo*.svg' -o -iname 'zabbix-logo*.svg' \) -exec cp /branding/zabbix_logo.svg {} \;
          volumeMounts:
            - name: zabbix-web-root
              mountPath: /work
            - name: zabbix-web-branding
              mountPath: /branding
              readOnly: true
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_SERVER_HOST
              value: postgresql
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "admin"
            - name: POSTGRES_DB
              value: "zabbix"
            - name: ZBX_SERVER_HOST
              value: zabbix-server
            - name: ZBX_SERVER_PORT
              value: "10051"
            - name: ZBX_SERVER_NAME
              value: "Ka0s NOC"
          volumeMounts:
            - name: zabbix-web-root
              mountPath: /usr/share/zabbix
      volumes:
        - name: zabbix-web-root
          emptyDir: {}
        - name: zabbix-web-branding
          configMap:
            name: zabbix-web-branding

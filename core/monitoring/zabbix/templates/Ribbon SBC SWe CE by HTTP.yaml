      discovery_rules:
        - uuid: d886ff2a43f34450bc88de7d4956a226
          name: 'CPU discovery'
          type: DEPENDENT
          key: ribbon.cpu.discovery
          description: 'Used for the discovery of CPU.'
          item_prototypes:
            - uuid: 539d896b890e40fc80140e485c66c9e7
              name: 'CPU [{#CPU.NUM}]: Utilization'
              type: DEPENDENT
              key: 'ribbon.sync.cpu.util[{#CPU.NUM}]'
              units: '!%'
              description: 'The average CPU utilization for this interval (in percent).'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.cpuUtilCurrentStatistics.["{#CPU.NUM}"].average'
              master_item:
                key: ribbon.server.data.get
              tags:
                - tag: component
                  value: cpu
                - tag: cpu
                  value: '{#CPU.NUM}'
          master_item:
            key: ribbon.server.data.get
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  const json_data = JSON.parse(value)["cpuUtilCurrentStatistics"];
                  var output_data = [];
                  
                  for (var entity in json_data) {
                  	output_data.push({
                  		"{#CPU.NUM}": json_data[entity]["cpu"]
                  	});
                  };
                  
                  return JSON.stringify(output_data);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h

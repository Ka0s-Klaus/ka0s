            - type: JSONPATH
              parameters:
                - $.entities
            - type: JAVASCRIPT
              parameters:
                - |
                  const json_data = JSON.parse(value);
                  
                  const result = json_data.map(function(entity) {
                  	return {
                  		"{#NUTANIX.HOST.NAME}": entity.name ? entity.name : entity.uuid,
                  		"{#NUTANIX.HOST.UUID}": entity.uuid
                  	};
                  });
                  
                  return JSON.stringify(result);

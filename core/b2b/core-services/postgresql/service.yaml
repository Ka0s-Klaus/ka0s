apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: postgresql
  labels:
    app: postgresql
spec:
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  - port: 10050
    targetPort: 10050
    protocol: TCP
    name: zabbix-agent
  selector:
    app: postgresql
    role: primary
  type: ClusterIP

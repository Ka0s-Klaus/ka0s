name: "Auto Verify Incident"

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      scan_all:
        description: 'Escanear todas las issues abiertas con label itop-incident'
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 * * * *' # Ejecutar cada hora

permissions:
  issues: write
  contents: read

env:
  KAOS_MODULE: "[Ka0S] Incident Verification"

jobs:
  verify-incident:
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'itop-incident')) ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule')
    name: Verify Incident Service
    runs-on: swarm-runners-scaleset
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GH CLI (if needed)
        # swarm-runners-scaleset debería tener gh, pero por seguridad podemos usar la action oficial si falla
        # o asumir que está. Vamos a asumir que está o instalarlo si no.
        # Mejor usar la action de setup-gh si existe, o confiar en el runner.
        run: |
          if ! command -v gh &> /dev/null; then
             echo "gh cli not found, installing..."
             # Lógica de instalación simplificada o warning
             # En entorno Ka0s runners suelen tenerlo.
          else
             echo "gh cli found: $(gh --version)"
          fi

      - name: Verify Incident(s)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Modo Batch: Escaneando todas las issues..."
            python3 .github/scripts/verify-incident.py --scan-all
          else
            echo "Modo Single: Verificando Issue #${{ github.event.issue.number }}..."
            # verify-incident.py soporta --issue-number para actuar directamente
            python3 .github/scripts/verify-incident.py \
              --issue-body "$ISSUE_BODY" \
              --issue-number "$ISSUE_NUMBER"
          fi

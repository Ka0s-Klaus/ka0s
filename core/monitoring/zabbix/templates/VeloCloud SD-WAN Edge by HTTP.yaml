            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: velocloud.edge.get.data
          tags:
            - tag: component
              value: edge
            - tag: component
              value: system
        - uuid: e875793d90e04672b1ac4ffa79c0e40a

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: zabbix-web-branding
    files:
      - zabbix_logo.png=branding/zabbix_logo.png
      - zabbix_logo.svg=branding/zabbix_logo.svg
resources:
  - namespace.yaml
  - zabbix-server-deployment.yaml
  - zabbix-server-service.yaml
  - zabbix-agent-daemonset.yaml
  - zabbix-agent-service.yaml
  - zabbix-scripts.yaml
  - zabbix-k8s-rbac.yaml
  - zabbix-web-deployment.yaml
  - zabbix-web-service.yaml
  - ingress.yaml

          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  const json_data = JSON.parse(value);
                  var output_data = [];
                  
                  for (var entity in json_data) {
                  	output_data.push({
                  		"{#STORAGE.CONTAINER.UUID}": json_data[entity].storage_container_uuid,
                  		"{#STORAGE.CONTAINER.NAME}": json_data[entity].name
                  	});
                  }
                  
                  return JSON.stringify(output_data);

    import hashlib
    import json
    import os
    import time
    from typing import Any, Iterable


    def utc_ts() -> int:
        return int(time.time())


    def run_id_now() -> str:
        return time.strftime("%Y%m%d_%H%M%S", time.gmtime())


    def ensure_dir(path: str) -> None:
        os.makedirs(path, exist_ok=True)


    def stable_json(obj: Any) -> str:
        return json.dumps(obj, ensure_ascii=False, sort_keys=True, separators=(",", ":"))


    def parse_csv_set(value: str | None) -> set[str]:
        if not value:
            return set()
        parts = [p.strip() for p in value.split(",")]
        return {p for p in parts if p}


    def filter_dict_fields(obj: Any, allow: set[str], deny: set[str]) -> Any:
        if not isinstance(obj, dict):
            return obj
        if allow:
            filtered = {k: obj.get(k) for k in allow if k in obj}
        else:
            filtered = dict(obj)
        for k in list(filtered.keys()):
            if k in deny:
                filtered.pop(k, None)
        return filtered


    def stable_record_id_from_pk(values: list[Any]) -> str:
        parts = []
        for v in values:
            if v is None:
                parts.append("null")
            else:
                parts.append(str(v))
        return "|".join(parts)


    def filter_names(items: list[str], include_csv: str, exclude_csv: str) -> list[str]:
        include = parse_csv_set(include_csv)
        exclude = parse_csv_set(exclude_csv)
        out: list[str] = []
        for it in items:
            if include and it not in include:
                continue
            if it in exclude:
                continue
            out.append(it)
        return out


    def sha256_text(text: str) -> str:
        return hashlib.sha256(text.encode("utf-8")).hexdigest()


    def chunk_text(text: str, max_chars: int, overlap: int) -> Iterable[str]:
        if max_chars <= 0:
            raise ValueError("max_chars must be > 0")
        if overlap < 0:
            raise ValueError("overlap must be >= 0")
        if not text:
            return
        step = max_chars - overlap
        if step <= 0:
            step = max_chars
        i = 0
        n = len(text)
        while i < n:
            yield text[i : i + max_chars]
            i += step


    def bool_env(name: str, default: bool) -> bool:
        v = os.environ.get(name)
        if v is None:
            return default
        v = v.strip().lower()
        if v in {"1", "true", "yes", "y", "on"}:
            return True
        if v in {"0", "false", "no", "n", "off"}:
            return False
        return default


    def int_env(name: str, default: int) -> int:
        v = os.environ.get(name)
        if v is None:
            return default
        try:
            return int(v)
        except Exception:
            return default


    def read_json(path: str) -> Any:
        with open(path, "r", encoding="utf-8") as f:
            return json.load(f)


    def write_json(path: str, obj: Any) -> None:
        ensure_dir(os.path.dirname(path))
        with open(path, "w", encoding="utf-8") as f:
            json.dump(obj, f, ensure_ascii=False, sort_keys=True)


  ollama_embed.py: |
    import os
    from typing import List

    import requests


    def embed(prompt: str) -> List[float]:
        base_url = os.environ["OLLAMA_EMBED_URL"].rstrip("/")
        model = os.environ.get("EMBEDDING_MODEL", "nomic-embed-text")
        timeout = float(os.environ.get("OLLAMA_TIMEOUT", "60"))
        r = requests.post(
            f"{base_url}/api/embeddings",
            json={"model": model, "prompt": prompt},
            timeout=timeout,
        )
        r.raise_for_status()
        data = r.json()
        return data["embedding"]


  spool_write.py: |
    import json
    import os
    from typing import Any, Dict

    from common import ensure_dir, stable_json, utc_ts


    def open_run_dir(source: str, spool_dir: str, run_id: str) -> str:
        base = os.path.join(spool_dir, source, run_id)
        ensure_dir(base)
        return base


    def write_manifest(base: str, manifest: Dict[str, Any]) -> None:
        path = os.path.join(base, "manifest.json")
        manifest = dict(manifest)
        manifest.setdefault("updated_at", utc_ts())
        with open(path, "w", encoding="utf-8") as f:
            f.write(stable_json(manifest))


    def append_jsonl(path: str, obj: Dict[str, Any]) -> None:
        with open(path, "a", encoding="utf-8") as f:
            f.write(json.dumps(obj, ensure_ascii=False) + "\n")


  state.py: |
    import os
    from typing import Any, Dict

    from common import read_json, write_json


    def state_path(spool_dir: str, source: str) -> str:
        return os.path.join(spool_dir, source, "_state", "state.json")


    def load_state(spool_dir: str, source: str) -> Dict[str, Any]:
        path = state_path(spool_dir, source)
        if not os.path.exists(path):
            return {}
        data = read_json(path)
        return data if isinstance(data, dict) else {}


    def save_state(spool_dir: str, source: str, data: Dict[str, Any]) -> None:
        write_json(state_path(spool_dir, source), data)


  produce_mongo.py: |
    import os
    from typing import Any, Dict

    from bson import ObjectId
    from pymongo import MongoClient

    from common import (
        int_env,
        chunk_text,
        filter_dict_fields,
        filter_names,
        parse_csv_set,
        run_id_now,
        sha256_text,
        stable_json,
        utc_ts,
    )
    from ollama_embed import embed
    from spool_write import append_jsonl, open_run_dir, write_manifest
    from state import load_state, save_state


    def _doc_to_text(doc: Dict[str, Any], allow: set[str], deny: set[str]) -> str:
        doc = dict(doc)
        doc.pop("_id", None)
        doc = filter_dict_fields(doc, allow=allow, deny=deny)
        return stable_json(doc)


    def _parse_object_id(value: str) -> ObjectId | None:
        try:
            return ObjectId(value)
        except Exception:
            return None


    def main() -> None:
        source = os.environ.get("SOURCE", "mongo")
        spool_dir = os.environ.get("SPOOL_DIR", "/spool")
        run_id = run_id_now()
        mongo_uri = os.environ["MONGO_URI"]
        mongo_db = os.environ.get("MONGO_DB", "audit")
        collections = os.environ.get("MONGO_COLLECTIONS", "*")
        collections_exclude = os.environ.get("MONGO_COLLECTIONS_EXCLUDE", "")
        mode = os.environ.get("MODE", "auto")
        allow_fields = parse_csv_set(os.environ.get("MONGO_ALLOW_FIELDS"))
        deny_fields = parse_csv_set(os.environ.get("MONGO_DENY_FIELDS"))
        max_chars = int(os.environ.get("CHUNK_MAX_CHARS", "2000"))
        overlap = int(os.environ.get("CHUNK_OVERLAP_CHARS", "200"))
        max_docs = int_env("MAX_DOCS_PER_RUN", 0)
        max_chunks = int_env("MAX_CHUNKS_PER_RUN", 0)

        base = open_run_dir(source, spool_dir, run_id)
        vectors_path = os.path.join(base, "vectors.jsonl")

        state = load_state(spool_dir, source)
        if mode == "auto":
            has_state = bool(state.get("collections"))
            mode = "incremental" if has_state else "full"

        manifest = {
            "run_id": run_id,
            "source": source,
            "mode": mode,
            "state": "running",
            "created_at": utc_ts(),
        }
        write_manifest(base, manifest)

        client = MongoClient(mongo_uri)
        db = client[mongo_db]
        all_collections = db.list_collection_names()
        all_collections = [c for c in all_collections if not c.startswith("system.")]
        if collections == "*":
            target_collections = filter_names(all_collections, include_csv="", exclude_csv=collections_exclude)
        else:
            target_collections = filter_names(all_collections, include_csv=collections, exclude_csv=collections_exclude)

        state_collections = state.setdefault("collections", {})
        total_chunks = 0
        total_docs = 0
        for col_name in target_collections:
            col = db[col_name]

            query: Dict[str, Any] = {}
            if mode == "incremental":
                last_id = state_collections.get(col_name)
                if isinstance(last_id, str):
                    last_oid = _parse_object_id(last_id)
                    if last_oid is not None:
                        query = {"_id": {"$gt": last_oid}}
                    else:
                        query = {}

            cursor = col.find(query, no_cursor_timeout=True).sort("_id", 1)
            max_seen_oid: ObjectId | None = None
            for doc in cursor:
                if max_docs > 0 and total_docs >= max_docs:
                    break
                record_id = str(doc.get("_id"))
                text = _doc_to_text(doc, allow_fields, deny_fields)
                i = 0
                for chunk in chunk_text(text, max_chars=max_chars, overlap=overlap):
                    if max_chunks > 0 and total_chunks >= max_chunks:
                        break
                    content_hash = sha256_text(chunk)
                    emb = embed(chunk)
                    append_jsonl(
                        vectors_path,
                        {
                            "source": source,
                            "record_id": f"{mongo_db}.{col_name}.{record_id}",
                            "chunk_id": i,
                            "content": chunk,
                            "content_hash": content_hash,
                            "embedding_model": os.environ.get("EMBEDDING_MODEL", "nomic-embed-text"),
                            "embedding_dim": int(os.environ.get("EMBEDDING_DIM", "768")),
                            "embedding": emb,
                        },
                    )
                    i += 1
                    total_chunks += 1

                total_docs += 1
                if max_chunks > 0 and total_chunks >= max_chunks:
                    break

                oid = doc.get("_id")
                if isinstance(oid, ObjectId):
                    max_seen_oid = oid

            if mode == "incremental" and max_seen_oid is not None:
                state_collections[col_name] = str(max_seen_oid)
                save_state(spool_dir, source, state)

            if max_docs > 0 and total_docs >= max_docs:
                break
            if max_chunks > 0 and total_chunks >= max_chunks:
                break

        manifest["state"] = "ready_for_load"
        manifest["chunks"] = total_chunks
        manifest["docs"] = total_docs
        write_manifest(base, manifest)


    if __name__ == "__main__":
        main()


  produce_postgresql.py: |
    import json
    import os
    import re
    from typing import Any, Dict, List

    import psycopg2
    from psycopg2 import sql

    from common import (
        chunk_text,
        filter_dict_fields,
        filter_names,
        int_env,
        parse_csv_set,
        run_id_now,
        sha256_text,
        stable_json,
        stable_record_id_from_pk,
        utc_ts,
    )
    from ollama_embed import embed
    from spool_write import append_jsonl, open_run_dir, write_manifest
    from state import load_state, save_state


    def _row_to_text(row: Dict[str, Any]) -> str:
        return stable_json(row)


    def _list_tables(cur, schema: str) -> List[str]:
        cur.execute(
            """
            SELECT table_name
            FROM information_schema.tables
            WHERE table_schema = %s AND table_type = 'BASE TABLE'
            ORDER BY table_name
            """,
            (schema,),
        )
        return [r[0] for r in cur.fetchall()]


    def _pk_columns(cur, schema: str, table: str) -> List[str]:
        cur.execute(
            """
            SELECT kcu.column_name
            FROM information_schema.table_constraints tc
            JOIN information_schema.key_column_usage kcu
              ON tc.constraint_name = kcu.constraint_name
             AND tc.table_schema = kcu.table_schema
             AND tc.table_name = kcu.table_name
            WHERE tc.constraint_type = 'PRIMARY KEY'
              AND tc.table_schema = %s
              AND tc.table_name = %s
            ORDER BY kcu.ordinal_position
            """,
            (schema, table),
        )
        return [r[0] for r in cur.fetchall()]


    def main() -> None:
        source = os.environ.get("SOURCE", "postgresql-monitoring")
        spool_dir = os.environ.get("SPOOL_DIR", "/spool")
        run_id = run_id_now()
        schema = os.environ.get("PG_SCHEMA", "public")
        tables = os.environ.get("PG_TABLES", "*")
        tables_exclude = os.environ.get("PG_TABLES_EXCLUDE", "")
        mode = os.environ.get("MODE", "auto")
        watermark_field = os.environ.get("PG_WATERMARK_FIELD", "updated_at")
        allow_fields = parse_csv_set(os.environ.get("PG_ALLOW_FIELDS"))
        deny_fields = parse_csv_set(os.environ.get("PG_DENY_FIELDS"))
        max_chars = int(os.environ.get("CHUNK_MAX_CHARS", "2000"))
        overlap = int(os.environ.get("CHUNK_OVERLAP_CHARS", "200"))
        max_rows_per_table = int_env("MAX_ROWS_PER_TABLE", 0)
        max_rows_total = int_env("MAX_ROWS_PER_RUN", 0)
        max_chunks_total = int_env("MAX_CHUNKS_PER_RUN", 0)

        base = open_run_dir(source, spool_dir, run_id)
        vectors_path = os.path.join(base, "vectors.jsonl")

        state = load_state(spool_dir, source)
        if mode == "auto":
            has_state = bool(state.get("tables")) or bool(state.get("no_watermark_tables"))
            mode = "incremental" if has_state else "full"

        manifest = {
            "run_id": run_id,
            "source": source,
            "mode": mode,
            "state": "running",
            "created_at": utc_ts(),
        }
        write_manifest(base, manifest)

        conn = psycopg2.connect(
            host=os.environ["POSTGRES_SRC_HOST"],
            port=int(os.environ.get("POSTGRES_SRC_PORT", "5432")),
            dbname=os.environ["POSTGRES_SRC_DB"],
            user=os.environ["POSTGRES_SRC_USER"],
            password=os.environ["POSTGRES_SRC_PASSWORD"],
        )
        meta_cur = conn.cursor()

        available_tables = _list_tables(meta_cur, schema)
        if tables == "*":
            target_tables = filter_names(available_tables, include_csv="", exclude_csv=tables_exclude)
        else:
            target_tables = filter_names(available_tables, include_csv=tables, exclude_csv=tables_exclude)

        state_tables = state.setdefault("tables", {})
        no_wm_done = state.setdefault("no_watermark_tables", {})
        total_chunks = 0
        total_rows = 0
        for table in target_tables:
            pk_cols = _pk_columns(meta_cur, schema, table)
            meta_cur.execute(
                """
                SELECT 1
                FROM information_schema.columns
                WHERE table_schema = %s AND table_name = %s AND column_name = %s
                LIMIT 1
                """,
                (schema, table, watermark_field),
            )
            has_wm = meta_cur.fetchone() is not None

            table_key = f"{schema}.{table}"
            if not has_wm and mode == "incremental" and no_wm_done.get(table_key) is True:
                continue

            where = ""
            params: tuple[Any, ...] = tuple()
            if mode == "incremental":
                last_wm = state_tables.get(f"{schema}.{table}")
                if has_wm and isinstance(last_wm, str) and last_wm:
                    where = f" WHERE {watermark_field} > %s"
                    params = (last_wm,)

            cursor_name = re.sub(r"[^a-zA-Z0-9_]+", "_", f"kaos_stream_{schema}_{table}")
            if has_wm:
                q = sql.SQL("SELECT row_to_json(t), t.{wm} FROM {schema}.{table} t").format(
                    wm=sql.Identifier(watermark_field),
                    schema=sql.Identifier(schema),
                    table=sql.Identifier(table),
                )
                if where:
                    q = q + sql.SQL(" WHERE {wm} > %s").format(wm=sql.Identifier(watermark_field))
                q = q + sql.SQL(" ORDER BY t.{wm} ASC").format(wm=sql.Identifier(watermark_field))
                query_sql = q
            else:
                query_sql = sql.SQL("SELECT row_to_json(t), NULL FROM {schema}.{table} t").format(
                    schema=sql.Identifier(schema),
                    table=sql.Identifier(table),
                )

            cur = conn.cursor(name=cursor_name)
            cur.itersize = int(os.environ.get("PG_FETCH_SIZE", "1000"))
            cur.execute(query_sql, params)
            max_seen = None
            table_rows = 0
            for row_json, wm in cur:
                if max_rows_total > 0 and total_rows >= max_rows_total:
                    break
                if max_rows_per_table > 0 and table_rows >= max_rows_per_table:
                    break
                row = row_json if isinstance(row_json, dict) else json.loads(row_json)
                if pk_cols:
                    pk_values = [row.get(c) for c in pk_cols]
                    record_id = stable_record_id_from_pk(pk_values)
                else:
                    record_id = sha256_text(_row_to_text(row))

                row = filter_dict_fields(row, allow=allow_fields, deny=deny_fields)
                text = _row_to_text(row)
                i = 0
                for chunk in chunk_text(text, max_chars=max_chars, overlap=overlap):
                    if max_chunks_total > 0 and total_chunks >= max_chunks_total:
                        break
                    emb = embed(chunk)
                    append_jsonl(
                        vectors_path,
                        {
                            "source": source,
                            "record_id": f"{schema}.{table}.{record_id}",
                            "chunk_id": i,
                            "content": chunk,
                            "content_hash": sha256_text(chunk),
                            "embedding_model": os.environ.get("EMBEDDING_MODEL", "nomic-embed-text"),
                            "embedding_dim": int(os.environ.get("EMBEDDING_DIM", "768")),
                            "embedding": emb,
                        },
                    )
                    i += 1
                    total_chunks += 1

                total_rows += 1
                table_rows += 1

                if max_chunks_total > 0 and total_chunks >= max_chunks_total:
                    break

                max_seen = wm

            cur.close()

            if mode == "incremental" and has_wm and max_seen is not None:
                state_tables[f"{schema}.{table}"] = str(max_seen)
                save_state(spool_dir, source, state)

            if not has_wm:
                no_wm_done[table_key] = True
                save_state(spool_dir, source, state)

            if max_rows_total > 0 and total_rows >= max_rows_total:
                break
            if max_chunks_total > 0 and total_chunks >= max_chunks_total:
                break

        manifest["state"] = "ready_for_load"
        manifest["chunks"] = total_chunks
        manifest["rows"] = total_rows
        write_manifest(base, manifest)


    if __name__ == "__main__":
        main()


  produce_mysql.py: |
    import os
    from typing import Any, Dict, List

    import mysql.connector
    import re

    from common import (
        chunk_text,
        filter_dict_fields,
        filter_names,
        int_env,
        parse_csv_set,
        run_id_now,
        sha256_text,
        stable_json,
        stable_record_id_from_pk,
        utc_ts,
    )
    from ollama_embed import embed
    from spool_write import append_jsonl, open_run_dir, write_manifest
    from state import load_state, save_state


    def _row_to_text(row: Dict[str, Any]) -> str:
        return stable_json(row)


    def _list_tables(meta_cur) -> List[str]:
        meta_cur.execute("SHOW TABLES")
        return [r[0] for r in meta_cur.fetchall()]


    def _pk_columns(meta_cur, table: str) -> List[str]:
        safe = "".join(ch for ch in table if ch.isalnum() or ch == "_")
        if safe != table or not safe:
            return []
        meta_cur.execute(f"SHOW KEYS FROM `{safe}` WHERE Key_name = 'PRIMARY'")
        rows = meta_cur.fetchall()
        cols: List[str] = []
        for r in rows:
            col = r[4]
            if isinstance(col, str) and col:
                cols.append(col)
        return cols


    def _safe_ident(value: str) -> str:
        return value if re.fullmatch(r"[A-Za-z0-9_]+", value or "") else ""


    def main() -> None:
        source = os.environ.get("SOURCE", "mysql-itil")
        spool_dir = os.environ.get("SPOOL_DIR", "/spool")
        run_id = run_id_now()
        tables = os.environ.get("MYSQL_TABLES", "*")
        tables_exclude = os.environ.get("MYSQL_TABLES_EXCLUDE", "")
        mode = os.environ.get("MODE", "auto")
        watermark_field = os.environ.get("MYSQL_WATERMARK_FIELD", "updated_at")
        allow_fields = parse_csv_set(os.environ.get("MYSQL_ALLOW_FIELDS"))
        deny_fields = parse_csv_set(os.environ.get("MYSQL_DENY_FIELDS"))
        max_chars = int(os.environ.get("CHUNK_MAX_CHARS", "2000"))
        overlap = int(os.environ.get("CHUNK_OVERLAP_CHARS", "200"))
        max_rows_per_table = int_env("MAX_ROWS_PER_TABLE", 0)
        max_rows_total = int_env("MAX_ROWS_PER_RUN", 0)
        max_chunks_total = int_env("MAX_CHUNKS_PER_RUN", 0)

        base = open_run_dir(source, spool_dir, run_id)
        vectors_path = os.path.join(base, "vectors.jsonl")

        state = load_state(spool_dir, source)
        if mode == "auto":
            has_state = bool(state.get("tables")) or bool(state.get("no_watermark_tables"))
            mode = "incremental" if has_state else "full"

        manifest = {
            "run_id": run_id,
            "source": source,
            "mode": mode,
            "state": "running",
            "created_at": utc_ts(),
        }
        write_manifest(base, manifest)

        conn = mysql.connector.connect(
            host=os.environ["MYSQL_HOST"],
            port=int(os.environ.get("MYSQL_PORT", "3306")),
            user=os.environ["MYSQL_USER"],
            password=os.environ["MYSQL_PASSWORD"],
            database=os.environ["MYSQL_DB"],
        )
        cur = conn.cursor(dictionary=True)
        meta_cur = conn.cursor()

        available_tables = _list_tables(meta_cur)
        if tables == "*":
            target_tables = filter_names(available_tables, include_csv="", exclude_csv=tables_exclude)
        else:
            target_tables = filter_names(available_tables, include_csv=tables, exclude_csv=tables_exclude)

        state_tables = state.setdefault("tables", {})
        no_wm_done = state.setdefault("no_watermark_tables", {})
        total_chunks = 0
        total_rows = 0
        for table in target_tables:
            safe_table = _safe_ident(table)
            if not safe_table:
                continue
            safe_watermark = _safe_ident(watermark_field)
            pk_cols = _pk_columns(meta_cur, table)
            if safe_watermark:
                cur.execute(f"SHOW COLUMNS FROM `{safe_table}` LIKE %s", (safe_watermark,))
            else:
                cur.execute(f"SHOW COLUMNS FROM `{safe_table}`")
            has_wm = cur.fetchone() is not None

            if not has_wm and mode == "incremental" and no_wm_done.get(table) is True:
                continue

            where = ""
            params = ()
            if mode == "incremental" and safe_watermark:
                last_wm = state_tables.get(table)
                if has_wm and isinstance(last_wm, str) and last_wm:
                    where = f" WHERE `{safe_watermark}` > %s"
                    params = (last_wm,)

            if has_wm and safe_watermark:
                cur.execute(
                    f"SELECT * FROM `{safe_table}`{where} ORDER BY `{safe_watermark}` ASC",
                    params,
                )
            else:
                cur.execute(f"SELECT * FROM `{safe_table}`")
            max_seen = None
            table_rows = 0
            for row in cur:
                if max_rows_total > 0 and total_rows >= max_rows_total:
                    break
                if max_rows_per_table > 0 and table_rows >= max_rows_per_table:
                    break
                if pk_cols:
                    pk_values = [row.get(c) for c in pk_cols]
                    record_id = stable_record_id_from_pk(pk_values)
                else:
                    record_id = sha256_text(_row_to_text(row))

                row = filter_dict_fields(row, allow=allow_fields, deny=deny_fields)
                text = _row_to_text(row)
                i = 0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8-node-40
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8-node-20
      initContainers:
        - name: init-zabbix-web-branding
          image: zabbix/zabbix-web-nginx-pgsql@sha256:67bc74b10d1dc443515153ec6080f0119ddb1f3ea07f3337779e067aa5440c78
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /work
              # Copy original files to work directory, ignoring errors for special files/permissions
              cp -a /usr/share/zabbix/. /work/ 2>/dev/null || true

              if [ -f /branding/zabbix_logo.png ]; then
                mkdir -p /work/ui/assets/img /work/assets/img
                # Explicitly copy the logo to the location expected by the injected CSS
                cp /branding/zabbix_logo.png /work/ui/assets/img/zabbix_logo.png 2>/dev/null || true
                cp /branding/zabbix_logo.png /work/assets/img/zabbix_logo.png 2>/dev/null || true
                # Replace ALL png logos related to Zabbix
                find /work -type f \( -iname '*zabbix*.png' -o -iname '*logo*.png' \) -exec cp /branding/zabbix_logo.png {} \; 2>/dev/null || true
              fi
              if [ -f /branding/zabbix_logo_compact.png ]; then
                mkdir -p /work/ui/assets/img /work/assets/img
                cp /branding/zabbix_logo_compact.png /work/ui/assets/img/zabbix_logo_compact.png 2>/dev/null || true
                cp /branding/zabbix_logo_compact.png /work/assets/img/zabbix_logo_compact.png 2>/dev/null || true
              fi
              if [ -f /branding/favicon.png ]; then
                # Replace favicon and mobile icons
                find /work -type f \( -name "favicon.ico" -o -name "apple-touch-icon*.png" -o -name "ms-tile*.png" -o -name "touch-icon*.png" \) -exec cp /branding/favicon.png {} \; 2>/dev/null || true
              fi
              if [ -f /branding/zabbix_logo.svg ]; then
                mkdir -p /work/ui/assets/img /work/assets/img
                 # Replace ALL svg logos related to Zabbix
                find /work -type f \( -iname '*zabbix*.svg' -o -iname '*logo*.svg' \) -exec cp /branding/zabbix_logo.svg {} \; 2>/dev/null || true
              fi
              grep -RIl "zabbix-logo-sidebar" /work 2>/dev/null | while IFS= read -r f; do
                case "$f" in
                  *.css) printf '\n.zabbix-logo-sidebar{background-image:url(../img/zabbix_logo.png) !important;background-repeat:no-repeat !important;background-size:250px !important;background-position:left center !important;background-color:transparent !important;width:220px !important;height:56px !important;}\n.sidebar-compact .zabbix-logo-sidebar,.is-compact .zabbix-logo-sidebar,.sidebar-collapsed .zabbix-logo-sidebar,.zabbix-logo-sidebar-compact,.zabbix-logo-sidebar-mini{background-image:url(../img/zabbix_logo_compact.png) !important;background-repeat:no-repeat !important;background-size:130px auto !important;background-position:center center !important;background-color:transparent !important;width:30px !important;height:56px !important;}\n.signin-logo{background:url(../img/zabbix_logo.png) no-repeat center center !important;background-size:contain !important;width:100%% !important;height:120px !important;margin:0 auto 20px !important;float:none !important;}\nbody.guest-login .signin-logo, body.login .signin-logo {display:block !important;}\n' >> "$f" ;;
                esac
              done
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: zabbix-web-root
              mountPath: /work
            - name: zabbix-web-branding
              mountPath: /branding
              readOnly: true
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql@sha256:67bc74b10d1dc443515153ec6080f0119ddb1f3ea07f3337779e067aa5440c78
          ports:
            - containerPort: 8080
          env:
            - name: DB_SERVER_HOST
              value: postgresql.postgresql.svc.cluster.local
            - name: POSTGRES_USER
              value: "zabbix"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db
                  key: postgres-password
            - name: POSTGRES_DB
              value: "zabbix"
            - name: ZBX_SERVER_HOST
              value: zabbix-server
            - name: ZBX_SERVER_PORT
              value: "10051"
            - name: ZBX_SERVER_NAME
              value: "Ka0s NOC"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: zabbix-web-root
              mountPath: /usr/share/zabbix
      volumes:
        - name: zabbix-web-root
          emptyDir: {}
        - name: zabbix-web-branding
          configMap:
            name: zabbix-web-branding

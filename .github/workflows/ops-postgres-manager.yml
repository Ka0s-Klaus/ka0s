name: "Ka0s Ops: Manage PostgreSQL"
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create-db
          - drop-db
      db_name:
        description: 'Database Name (e.g., metabase_db)'
        required: true
        type: string
      db_user:
        description: 'Database User (e.g., metabase_user)'
        required: true
        type: string
      target_namespace:
        description: 'Namespace to create the secret in (for create-db)'
        required: false
        type: string
        default: 'default'

permissions:
  contents: read

env:
  KAOS_MODULE: "[Ka0s] Ops PostgreSQL"
  KAOS_CODE: ${{ github.run_id }}

jobs:
  manage-db:
    runs-on: swarm-runners-scaleset-ka0s
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Kubectl Tunnel
        uses: ./.github/actions/kubectl-tunnel
        with:
          host: ${{ secrets.KAOS_SSH_HOST_1 }}
          username: ${{ secrets.KAOS_SSH_USER }}
          key: ${{ secrets.KAOS_SSH_KEY_PRIV }}
          port: ${{ secrets.KAOS_SSH_PORT_1 }}

      - name: Execute Database Operation
        env:
          ACTION: ${{ inputs.action }}
          DB_NAME: ${{ inputs.db_name }}
          DB_USER: ${{ inputs.db_user }}
          TARGET_NS: ${{ inputs.target_namespace }}
        run: |
          chmod +x .github/scripts/manage-postgres-db.sh
          ./.github/scripts/manage-postgres-db.sh "$ACTION" "$DB_NAME" "$DB_USER" "$TARGET_NS"

  handle-success:
    runs-on: swarm-runners-scaleset-ka0s
    needs: [manage-db]
    if: ${{ success() }}
    steps:
      - name: Notify Success
        run: echo "✅ ${{ env.KAOS_MODULE }} completado correctamente."

  handle-failure:
    name: Handle Failure
    needs: [manage-db]
    if: failure()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset-ka0s
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run inspector.yml \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}"

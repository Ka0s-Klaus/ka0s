name: Daily Lead Time Report

on:
  schedule:
    - cron: '55 23 * * *'  # Run at 23:55 UTC every day
  workflow_dispatch:

permissions:
  contents: read
  
env:
  KAOS_MODULE: "[Ka0S] Daily Lead Time Report"
  KAOS_CODE: ${{ github.run_id }}

jobs:
  generate-report:
    runs-on: swarm-runners-scaleset
    permissions:
      contents: write
    env:
      MONGO_CONNECTION_STRING: ${{ secrets.MONGO_SUPERUSER_CONNECTION }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pymongo

      - name: Generate Lead Time Report
        run: |
          python .github/scripts/generate-daily-lead-time.py

      - name: Commit Report
        run: |
          git config --global user.name "${{ secrets.KAOS_BOT_NAME }}"
          git config --global user.email "${{ secrets.KAOS_BOT_EMAIL }}"
          
          git add audit/reports/lead-time/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[Ka0S] Daily Lead Time Report $(date +'%Y-%m-%d')"
            git push
          fi

  handle-success:
    runs-on: swarm-runners-scaleset
    needs: [generate-report]
    if: ${{ success() }}
    steps:
      - name: Notify Success
        run: echo "✅ ${{ env.KAOS_MODULE }} completado correctamente."

  handle-failure:
    name: Handle Failure
    needs: [generate-report]
    if: failure()
    runs-on: swarm-runners-scaleset
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Create Incident Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[INCIDENT]: Fallo en workflow ${{ github.workflow }}" \
            --label "itop-incident,triage,automated" \
            --body "### Organización
          Ka0s
          
          ### Solicitante
          @${{ github.actor }}
          
          ### Estado
          New
          
          ### Impacto
          Service
          
          ### Urgencia
          Medium
          
          ### Servicio / CI afectado
          GitHub Actions / ${{ github.workflow }}
          
          ### Descripción
          El workflow **${{ github.workflow }}** ha fallado durante su ejecución.
          
          **Detalles Técnicos:**
          - **Módulo**: ${{ env.KAOS_MODULE }}
          - **Run ID**: ${{ github.run_id }}
          - **Commit**: ${{ github.sha }}
          - **Branch/Ref**: ${{ github.ref_name }}
          - **Actor**: ${{ github.actor }}
          
          ### Pasos / Evidencias
          Logs de ejecución: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "

  end-workflow:
    needs: [handle-success, handle-failure]
    if: always()
    runs-on: swarm-runners-scaleset
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GH CLI
        uses: ./.github/actions/install-gh-cli
      - name: Trigger Inspector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run inspector.yml \
            -f workflow_name="${{ github.workflow }}" \
            -f run_id="${{ github.run_id }}" \
            -f status="${{ job.status }}"

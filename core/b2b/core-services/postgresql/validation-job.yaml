apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-validation-job
  namespace: postgresql
  labels:
    app: postgresql
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      restartPolicy: OnFailure
      containers:
      - name: check-db
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        command: ["sh", "-c"]
        args:
          - |
            set -e
            echo "Waiting for PostgreSQL to be ready..."
            until pg_isready -h postgresql -U ka0s_admin -d ka0s_core; do
              echo "Waiting for database ka0s_core..."
              sleep 5
            done
            
            echo "Database is ready. Waiting 5s for stability..."
            sleep 5
            
            echo "Running validation query..."
            psql -h postgresql -U ka0s_admin -d ka0s_core -c "SELECT 1 as validation_check;" || {
              echo "❌ Connection failed with exit code $?"
              exit 1
            }
            
            echo "✅ Connection successful and query executed."

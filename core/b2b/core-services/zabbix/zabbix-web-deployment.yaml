apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_SERVER_HOST
              value: postgresql
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "admin"
            - name: POSTGRES_DB
              value: "zabbix"
            - name: ZBX_SERVER_HOST
              value: zabbix-server
            - name: ZBX_SERVER_PORT
              value: "10051"
            - name: ZBX_SERVER_NAME
              value: "Ka0s NOC"
          volumeMounts:
            - name: zabbix-web-branding
              mountPath: /usr/share/zabbix/assets/img/zabbix_logo.png
              subPath: zabbix_logo.png
            - name: zabbix-web-branding
              mountPath: /usr/share/zabbix/assets/img/zabbix_logo.svg
              subPath: zabbix_logo.svg
      volumes:
        - name: zabbix-web-branding
          configMap:
            name: zabbix-web-branding
